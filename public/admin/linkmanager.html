<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="js/admin-session-guard.js"></script>
  <title>Studio - Link Manager</title>
  <link rel="stylesheet" href="../assets/css/site.css" />
  <link rel="stylesheet" href="css/linkmanager.css" />
</head>
<body>
  <header id="siteHeader"></header>

  <main class="container">
    <section class="hero" style="padding-bottom:10px">
      <h1>Link Manager</h1>
      <p>Manage social media and other external links shown on public pages.</p>
    </section>

    <div class="admin-layout">
      <aside class="sidebar" aria-label="Studio navigation"></aside>

      <section>
        <section class="card external-links-card" aria-label="External links manager">
          <div class="meta">
            <div class="section-title">
              <h2>External Links</h2>
              <span id="externalLinksHint">0 links</span>
            </div>
            <p class="sub">These links are used on the Contact page and other public sections.</p>
            <div class="external-links-toolbar">
              <button class="btn" id="externalLinksAdd" type="button">Add link</button>
            </div>
            <div id="externalLinksRows" class="external-links-grid"></div>
          </div>
        </section>

        <footer id="siteFooter"></footer>
      </section>
    </div>
  </main>

  <script type="module" src="./js/linkmanager.js"></script>
</body>
</html>
