<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Toji Studios</title>
  <link rel="stylesheet" href="assets/css/site.css" />
  <style>
    .gallery-section{
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-top: 18px;
    }
    .gallery-section-featured{ background: color-mix(in srgb, var(--panel) 86%, var(--accent) 14%); }
    .gallery-section-series{ background: color-mix(in srgb, var(--panel) 88%, var(--alternateaccent) 12%); }

    #latestGrid{
      gap: 12px;
    }
    #featuredStrip{
      display: block;
      column-gap: 12px;
      columns: 4 220px;
      align-items: start;
      justify-content: start;
    }
    #homeSeriesGrid{
      display: block;
      column-gap: 12px;
      columns: 4 220px;
      align-items: start;
      justify-content: start;
    }
    #featuredStrip .card,
    #homeSeriesGrid .card{
      display: inline-block;
      width: 100%;
      max-width: none;
      margin: 0 0 12px 0;
      break-inside: avoid;
      vertical-align: top;
      box-shadow: none;
    }
    #featuredStrip .thumb,
    #homeSeriesGrid .thumb{
      aspect-ratio: auto;
      background: transparent;
    }
    #homeSeriesGrid .series-card{
      overflow: hidden;
    }
    #homeSeriesGrid .series-masonry{
      columns: 3 70px;
      column-gap: 6px;
      padding: 10px;
    }
    #homeSeriesGrid .series-masonry img{
      width: 100%;
      height: auto;
      display: block;
      margin: 0 0 6px 0;
      border-radius: 8px;
      break-inside: avoid;
      background: color-mix(in srgb, var(--surface) 80%, transparent);
      border: 1px solid var(--line);
    }
    @media (max-width: 720px){
      #homeSeriesGrid .series-masonry{
        columns: 2 90px;
      }
    }
    #featuredStrip .thumb img,
    #homeSeriesGrid .thumb img{
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center;
      background: transparent;
      display: block;
    }
    .home-series-item .sub{
      max-width: none;
      margin-top: 8px;
      line-height: 1.55;
    }
    #latestGrid .card{
      width: 100%;
      min-width: 0;
      max-width: none;
    }
    #featuredSlideshowSection{
      margin-top: 8px;
    }
    .home-slideshow{
      position: relative;
      width: 100%;
      min-height: 510px;
      height: clamp(360px, 57vh, 630px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: color-mix(in srgb, var(--panel) 86%, var(--bg));
      box-shadow: none;
    }
    .home-slideshow-carousel{
      width: 100%;
      height: 100%;
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent 0%, #000 6%, #000 94%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 6%, #000 94%, transparent 100%);
    }
    .home-slideshow-track{
      display: flex;
      width: max-content;
      height: 100%;
      gap: 14px;
      padding: 10px 0;
      animation: homeCarouselMove var(--carousel-duration, 56s) linear infinite;
      will-change: transform;
    }
    .home-slideshow-item{
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(99vw, 630px);
      min-width: 390px;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: color-mix(in srgb, var(--panel) 90%, transparent);
      padding: 10px;
    }
    .home-slideshow-item img{
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      background: var(--bg);
    }
    @keyframes homeCarouselMove{
      from{ transform: translateX(0); }
      to{ transform: translateX(calc(-50% - 7px)); }
    }
    @media (prefers-reduced-motion: reduce){
      .home-slideshow-track{ animation: none; }
    }
    .splash-active{
      overflow:hidden;
    }
    .splash-screen{
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      z-index:2000;
      display:grid;
      place-items:center;
      background: var(--bg);
      overflow:hidden;
      perspective: 1200px;
      transition: opacity .35s ease, visibility .35s ease;
    }
    .splash-screen.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }
    .splash-logo{
      position:absolute;
      top:50%;
      left:50%;
      z-index:2;
      border: 0;
      border-radius:0;
      background: transparent;
      color:var(--text);
      padding:3px 3px;
      cursor:pointer;
      text-align:center;
      box-shadow: none;
      transform-origin: 50% 18%;
      transform: translate(calc(-50% + var(--splash-logo-nudge-x, 0px)), calc(-50% + var(--splash-logo-nudge-y, 0px))) rotate(var(--splash-logo-tilt, 0deg)) scale(1);
      transition: top .6s ease, left .6s ease, transform .6s ease;
    }
    .splash-screen.logo-cornered .splash-logo{
      top:14px;
      left:14px;
      transform: translate(var(--splash-logo-nudge-x, 0px), var(--splash-logo-nudge-y, 0px)) rotate(var(--splash-logo-tilt, 0deg)) scale(0.5);
    }
    .splash-logo.is-melting{
      pointer-events:none;
    }
    .splash-logo.is-melting .splash-logo-combo{
      animation: splashLogoMelt .72s ease-in forwards;
      transform-origin: 50% 50%;
    }
    .splash-logo.is-melting .splash-logo-combo-image{
      animation: splashLogoMeltImage .72s ease-in forwards;
    }
    .splash-logo-title{
      margin:0;
      font-size: clamp(26px, 5vw, 56px);
      letter-spacing:.14em;
      line-height:1;
      font-weight:700;
    }
    .splash-logo-sub{
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
      letter-spacing:.2em;
      text-transform:uppercase;
    }
    .splash-logo .brand-logo-combo{
      gap: clamp(10px, 1.6vw, 18px);
      align-items: center;
    }
    .splash-logo .brand-logo-icon-image{
      width:min(20vw, 120px);
      height:auto;
    }
    .splash-logo .brand-logo-wordmark-image{
      width:min(52vw, 360px);
      height:auto;
    }
    @keyframes splashLogoMelt{
      0%{
        opacity:1;
        transform: scale(1);
        filter: blur(0);
        clip-path: inset(0% 0% 0% 0%);
      }
      22%{
        opacity:1;
        transform: scale(1.06);
        filter: blur(.4px);
      }
      58%{
        opacity:.95;
        transform: scale(1.24);
        filter: blur(2.2px);
      }
      100%{
        opacity:0;
        transform: scale(1.9);
        filter: blur(10px);
        clip-path: inset(-22% -22% -22% -22%);
      }
    }
    @keyframes splashLogoMeltImage{
      0%{ transform: scale(1); }
      45%{ transform: scale(1.12) rotate(-1deg); }
      100%{ transform: scale(1.86) rotate(2deg); }
    }
    .splash-p5{
      position:absolute;
      inset:0;
      width:100vw;
      height:100vh;
      z-index:1;
      pointer-events:none;
    }
    .splash-countdown{
      position:absolute;
      top:14px;
      left:14px;
      z-index:3;
      padding:5px 9px;
      border-radius:10px;
      border:1px solid color-mix(in srgb, var(--line) 82%, transparent);
      background: color-mix(in srgb, var(--panel) 78%, transparent);
      color:var(--muted);
      font-size:15px;
      letter-spacing:.02em;
      font-variant-numeric: tabular-nums;
      pointer-events:none;
      user-select:none;
      opacity:.92;
    }
    .splash-countdown.hidden{
      display:none;
    }
    .splash-p5 canvas{
      display:block;
      width:100vw !important;
      height:100vh !important;
    }
    .splash-logo-drift3d{
      position:absolute;
      left:0;
      top:0;
      z-index:1;
      width: clamp(180px, 30vw, 360px);
      height:auto;
      pointer-events:none;
      user-select:none;
      opacity:.72;
      transform-style: preserve-3d;
      will-change: transform;
      filter: drop-shadow(0 12px 26px rgba(0,0,0,.42));
    }
  </style>
</head>

<body class="home-animated">
  <div id="splashScreen" class="splash-screen hidden" aria-label="Splash screen">
    <div id="splashP5" class="splash-p5" aria-hidden="true"></div>
    <div id="splashCountdown" class="splash-countdown hidden" aria-live="polite"></div>
    <button id="splashLogo" class="splash-logo" type="button" aria-label="Enter site">
      <span class="brand-logo-combo splash-logo-combo" aria-hidden="true">
        <span class="brand-logo-icon-stack">
          <img class="brand-logo-icon-image splash-logo-combo-image" src="assets/img/TojiStudios-Logo.png" alt="" />
        </span>
        <span class="brand-logo-wordmark-stack">
          <img class="brand-logo-wordmark-image brand-logo-wordmark-image--for-dark splash-logo-combo-image" src="assets/img/TojiStudios-Light-TextOnly.png" alt="" />
          <img class="brand-logo-wordmark-image brand-logo-wordmark-image--for-light splash-logo-combo-image" src="assets/img/TojiStudios-Dark-TextOnly.png" alt="" />
        </span>

      <span class="sr-only">Toji Studios</span>

  </div>
  <header id="siteHeader"></header>

  <main class="container">
    <section class="hero" id="homeHeroSection">
      <h1>Toji Studios</h1>
      <p>Abstract, cosmic-leaning digital artwork—geometry, atmosphere, and controlled chaos.</p>
      <!-- <div class="cta">
        <a class="btn primary" href="gallery.html">Explore the Gallery</a>
        <a class="btn" href="contact.html">Inquire</a>
      </div> -->
    </section>

    <section id="featuredSlideshowSection" style="display:none">
      <div id="featuredSlideshow" class="home-slideshow" aria-label="Featured slideshow"></div>
    </section>

    <!-- Featured strip -->
    <section id="featuredSection" class="gallery-section gallery-section-featured" style="display:none">
      <div class="section-title">
        <h2>Featured</h2>
        <span id="featuredHint">—</span>
      </div>

      <div id="featuredStrip" aria-label="Featured artworks"></div>

    <section id="homeSeriesSection" class="gallery-section gallery-section-series" style="display:none">

      <section class="grid" id="homeSeriesGrid" aria-label="Series collection"></section>

    <!-- Latest works -->
    <section id="latestSection" style="display:none">
    <div class="section-title" style="margin-top:28px">
      <h2>Latest</h2>
      <span id="latestHint">—</span>
    </div>

    <section class="grid" id="latestGrid" aria-label="Latest artworks"></section>
    </section>


    <!-- <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:18px">
      <a class="btn primary" href="gallery.html">View all works</a>
      <a class="btn" href="contact.html">Licensing / commissions</a>
    </div> -->
  </main>

  <footer id="siteFooter"></footer>

  <script type="module">
    import { renderPublicHeader } from "./assets/js/header.js";
    import { renderPublicFooter } from "./assets/js/footer.js";
    import { el, slugifySeries, sortGallery, createArtworkLightboxController } from "./assets/js/content-utils.js";

    renderPublicHeader({
      active: "home",
      small: "home",
      ctaText: "Explore",
      ctaHref: "gallery.html",
      //brandLogoSrc: "assets/img/TojiStudios_LogoAndName_ForWebsite.png"
      brandLogoSrc: "assets/img/logo.png"
    });
    renderPublicFooter({
      rightHtml: `<a href="index.html">Home</a> • <a href="gallery.html">Gallery</a> • <a href="series.html">Series</a> • <a href="contact.html">Contact</a> • <a href="admin/index.html">Studio</a>`
    });

    const splashScreen = document.getElementById("splashScreen");
    const splashP5Host = document.getElementById("splashP5");
    const splashCountdown = document.getElementById("splashCountdown");
    const splashLogo = document.getElementById("splashLogo");
    const topLeftBrand = document.querySelector("#siteHeader .brand");
    let splashP5Instance = null;
    let splashRotationTimer = null;
    let splashCountdownTimer = null;
    let splashLogoCornerTimer = null;
    let splashNextSwitchAt = 0;
    let splashRotationSeconds = 0;
    let splashSwitching = false;
    let splashClosing = false;
    let activeSplashMode = "";
    let splashLogo3dEl = null;
    let splashLogo3dFrame = 0;
    let splashLogoIconP5 = null;
    let splashLogoIconCanvasHost = null;
    const SPLASH_ANIMATION_MODE_KEY = "toji_splash_animation_mode_v1"; // "random" | "nodes" | "bezier" | "flock" | "circles" | "matrix" | "life" | "code" | "plot" | "bounce" | "logo3d" | "turningcircles" | "asteroids" | "tempest" | "pi"
    const SPLASH_RANDOM_CYCLE_ENABLED_KEY = "toji_splash_random_cycle_enabled_v1";
    const SPLASH_RANDOM_CYCLE_SECONDS_KEY = "toji_splash_random_cycle_seconds_v1";
    const BANNER_BEZIER_LOGO_ENABLED_KEY = "toji_banner_logo_bezier_enabled_v1";
    const BANNER_LOGO_ANIMATION_MODE_KEY = "toji_banner_logo_animation_mode_v1";

    function getConfiguredSplashAnimationMode() {
      const mode = String(localStorage.getItem(SPLASH_ANIMATION_MODE_KEY) || "").toLowerCase();
      if (mode === "random") return "random";
      if (mode === "bezier") return "bezier";
      if (mode === "flock") return "flock";
      if (mode === "circles") return "circles";
      if (mode === "matrix") return "matrix";
      if (mode === "life") return "life";
      if (mode === "code") return "code";
      if (mode === "plot") return "plot";
      if (mode === "bounce") return "bounce";
      if (mode === "logo3d") return "logo3d";
      if (mode === "turningcircles") return "turningcircles";
      if (mode === "asteroids") return "asteroids";
      if (mode === "tempest") return "tempest";
      if (mode === "pi") return "pi";
      return "nodes";
    }

    function pickRandomSplashMode(preferDifferent = false) {
      const choices = ["nodes", "bezier", "flock", "circles", "matrix", "life", "code", "plot", "bounce", "logo3d", "turningcircles", "asteroids", "tempest", "pi"];
      let picked = choices[Math.floor(Math.random() * choices.length)];
      if (preferDifferent && activeSplashMode && choices.length > 1) {
        let tries = 0;
        while (picked === activeSplashMode && tries < 8) {
          picked = choices[Math.floor(Math.random() * choices.length)];
          tries += 1;
        }
      }
      return picked;
    }

    function getSplashAnimationMode() {
      const configured = getConfiguredSplashAnimationMode();
      if (configured === "random") return pickRandomSplashMode();
      return configured;
    }

    function getBannerLogoAnimationMode() {
      if (localStorage.getItem(BANNER_BEZIER_LOGO_ENABLED_KEY) !== "1") return "off";
      const mode = String(localStorage.getItem(BANNER_LOGO_ANIMATION_MODE_KEY) || "").toLowerCase();
      if (mode === "plot") return "plot";
      return "circles";
    }

    function getRandomCycleConfig() {
      const enabled = localStorage.getItem(SPLASH_RANDOM_CYCLE_ENABLED_KEY) === "1";
      const n = Math.floor(Number(localStorage.getItem(SPLASH_RANDOM_CYCLE_SECONDS_KEY)));
      const seconds = Number.isFinite(n) ? Math.min(600, Math.max(1, n)) : 12;
      return { enabled, seconds };
    }

    function clearSplashLogoCornerTimer() {
      if (splashLogoCornerTimer) {
        clearTimeout(splashLogoCornerTimer);
        splashLogoCornerTimer = null;
      }
      splashScreen?.classList.remove("logo-cornered");
    }

    function startSplashLogoCornerTimer() {
      clearSplashLogoCornerTimer();
      if (!splashScreen || splashScreen.classList.contains("hidden")) return;
      splashLogoCornerTimer = window.setTimeout(() => {
        if (!splashScreen || splashScreen.classList.contains("hidden")) return;
        splashScreen.classList.add("logo-cornered");
      }, 10000);
    }

    let splashLogoNudgeXOffset = 0;
    let splashLogoNudgeYOffset = 0;
    let splashLogoTiltDeg = 0;
    function nudgeSplashLogo(offsetXPx = 0, offsetYPx = 0) {
      if (!splashLogo) return;
      splashLogoNudgeXOffset = Math.max(-120, Math.min(120, splashLogoNudgeXOffset + Number(offsetXPx || 0)));
      splashLogoNudgeYOffset = Math.max(-80, Math.min(80, splashLogoNudgeYOffset + Number(offsetYPx || 0)));
      splashLogo.style.setProperty("--splash-logo-nudge-x", `${splashLogoNudgeXOffset}px`);
      splashLogo.style.setProperty("--splash-logo-nudge-y", `${splashLogoNudgeYOffset}px`);
    }

    function resetSplashLogoImpactVisual() {
      if (!splashLogo) return;
      splashLogoNudgeXOffset = 0;
      splashLogoNudgeYOffset = 0;
      splashLogo.style.setProperty("--splash-logo-nudge-x", "0px");
      splashLogo.style.setProperty("--splash-logo-nudge-y", "0px");
      splashLogoTiltDeg = 0;
      splashLogo.style.setProperty("--splash-logo-tilt", "0deg");
    }

    function applySplashLogoHitVisual(spinDirection = 1) {
      if (!splashLogo) return;
      const tiltStep = spinDirection < 0 ? -6 : 6;
      splashLogoTiltDeg = Math.max(-30, Math.min(30, splashLogoTiltDeg + tiltStep));
      splashLogo.style.setProperty("--splash-logo-tilt", `${splashLogoTiltDeg}deg`);
    }

    function stopSplashLogo3dAnimation() {
      if (splashLogo3dFrame) {
        cancelAnimationFrame(splashLogo3dFrame);
        splashLogo3dFrame = 0;
      }
      if (splashLogo3dEl) {
        splashLogo3dEl.remove();
        splashLogo3dEl = null;
      }
    }

    function startSplashLogo3dAnimation() {
      if (!splashScreen) return;
      stopSplashLogo3dAnimation();

      const logo = document.createElement("img");
      logo.className = "splash-logo-drift3d";
      logo.src = "assets/img/TojiStudios_Logo_v5.png";
      logo.alt = "";
      logo.setAttribute("aria-hidden", "true");
      splashScreen.appendChild(logo);
      splashLogo3dEl = logo;

      let x = window.innerWidth * 0.32;
      let y = window.innerHeight * 0.34;
      let vx = (Math.random() < 0.5 ? -1 : 1) * (0.24 + Math.random() * 0.18);
      let vy = (Math.random() < 0.5 ? -1 : 1) * (0.20 + Math.random() * 0.14);
      let yaw = Math.random() * 360;
      let pitch = Math.random() * 360;
      let roll = Math.random() * 360;
      let yawV = (Math.random() < 0.5 ? -1 : 1) * (0.48 + Math.random() * 0.35);
      let pitchV = (Math.random() < 0.5 ? -1 : 1) * (0.32 + Math.random() * 0.26);
      let rollV = (Math.random() < 0.5 ? -1 : 1) * (0.21 + Math.random() * 0.24);
      let last = 0;

      const tick = (ts) => {
        if (!splashLogo3dEl) return;
        if (!last) last = ts;
        const dt = Math.min(40, ts - last);
        last = ts;
        const step = dt / 16.6667;
        const w = window.innerWidth;
        const h = window.innerHeight;
        const margin = 42;
        const halfW = Math.max(90, splashLogo3dEl.offsetWidth * 0.5);
        const halfH = Math.max(56, splashLogo3dEl.offsetHeight * 0.5);

        x += vx * step;
        y += vy * step;

        if (x < halfW + margin) {
          x = halfW + margin;
          vx = Math.abs(vx);
        } else if (x > w - halfW - margin) {
          x = w - halfW - margin;
          vx = -Math.abs(vx);
        }
        if (y < halfH + margin) {
          y = halfH + margin;
          vy = Math.abs(vy);
        } else if (y > h - halfH - margin) {
          y = h - halfH - margin;
          vy = -Math.abs(vy);
        }

        yaw += yawV * step;
        pitch += pitchV * step;
        roll += rollV * step;

        splashLogo3dEl.style.transform =
          `translate3d(${x}px, ${y}px, 0) translate(-50%, -50%) rotateX(${pitch}deg) rotateY(${yaw}deg) rotateZ(${roll}deg)`;
        splashLogo3dFrame = requestAnimationFrame(tick);
      };

      splashLogo3dFrame = requestAnimationFrame(tick);
    }

    async function ensureP5() {
      if (window.p5) return;
      await new Promise((resolve, reject) => {
        const existing = document.querySelector('script[data-p5-splash]');
        if (existing) {
          existing.addEventListener("load", resolve, { once: true });
          existing.addEventListener("error", reject, { once: true });
          return;
        }
        const s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js";
        s.async = true;
        s.setAttribute("data-p5-splash", "1");
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    async function mountSplashLogoIconAnimation() {
      if (!splashLogo) return;
      const bannerMode = getBannerLogoAnimationMode();
      if (bannerMode === "off") return;
      await ensureP5();
      if (!window.p5) return;

      const combo = splashLogo.querySelector(".brand-logo-combo");
      if (!combo) return;

      let canvasHost = combo.querySelector(".brand-logo-canvas--icon");
      if (!canvasHost) {
        const iconStack = combo.querySelector(".brand-logo-icon-stack");
        if (!iconStack) return;
        const iconLogo = iconStack.querySelector(".brand-logo-icon-image");
        const rect = iconStack.getBoundingClientRect();
        const ratioFromRect = (rect.width > 1 && rect.height > 1) ? (rect.width / rect.height) : 0;
        const ratioFromImage = (iconLogo?.naturalWidth > 1 && iconLogo?.naturalHeight > 1)
          ? (iconLogo.naturalWidth / iconLogo.naturalHeight)
          : 0;
        const ratio = Math.max(0.6, Math.min(1.8, ratioFromRect || ratioFromImage || 1));
        canvasHost = document.createElement("span");
        canvasHost.className = "brand-logo-canvas brand-logo-canvas--icon";
        canvasHost.setAttribute("aria-hidden", "true");
        canvasHost.style.setProperty("--brand-logo-ratio", String(ratio));
        iconStack.replaceWith(canvasHost);
      }

      if (splashLogoIconP5 && splashLogoIconCanvasHost === canvasHost) return;
      if (splashLogoIconP5) {
        splashLogoIconP5.remove();
        splashLogoIconP5 = null;
      }
      splashLogoIconCanvasHost = canvasHost;

      const readThemeInk = () => {
        const raw = getComputedStyle(document.body).color || "";
        const m = raw.match(/(\d+)\D+(\d+)\D+(\d+)/);
        if (!m) return [255, 255, 255];
        return [Number(m[1]), Number(m[2]), Number(m[3])];
      };

      splashLogoIconP5 = new window.p5((p) => {
        let cw = 0;
        let ch = 0;
        let frame = 0;
        let startAtMs = 0;
        let plotFreq = 1.2;
        let plotPhase = 0;
        let plotAmp = 0.75;
        let plotFamily = 0;
        const ghostFrames = [];
        const cycleFrames = 380;
        const ringCount = 10;
        const ringDelay = 28;

        const reseedPlot = () => {
          plotFreq = p.random(0.6, 2.4);
          plotPhase = p.random(0, p.TWO_PI);
          plotAmp = p.random(0.45, 1.15);
          plotFamily = Math.floor(p.random(0, 5));
          ghostFrames.length = 0;
        };

        const evalMiniPlot = (xNorm, t) => {
          if (plotFamily === 0) return plotAmp * Math.sin((plotFreq * Math.PI * xNorm) + plotPhase + (t * 0.7));
          if (plotFamily === 1) return plotAmp * Math.exp(-0.7 * Math.abs(xNorm)) * Math.sin((plotFreq * Math.PI * xNorm) + (xNorm * xNorm * 2.1) + plotPhase + (t * 0.6));
          if (plotFamily === 2) return plotAmp * Math.tanh(2.1 * xNorm) * Math.sin((plotFreq * Math.PI * xNorm) + plotPhase + (t * 0.85));
          if (plotFamily === 3) return plotAmp * ((2 / (1 + Math.exp(-2.3 * xNorm))) - 1) + (0.35 * Math.sin((plotFreq * 2 * Math.PI * xNorm) + plotPhase + (t * 0.5)));
          return plotAmp * (Math.sin((plotFreq * Math.PI * xNorm) + plotPhase + (t * 0.55)) + (0.45 * Math.cos((plotFreq * 1.7 * Math.PI * xNorm) - (t * 0.35)))) / (1 + (0.8 * xNorm * xNorm));
        };

        p.setup = () => {
          cw = Math.max(2, Math.floor(canvasHost.clientWidth || 1));
          ch = Math.max(2, Math.floor(canvasHost.clientHeight || 1));
          const canvas = p.createCanvas(cw, ch);
          canvas.parent(canvasHost);
          startAtMs = p.millis();
          reseedPlot();
          p.clear();
        };

        p.draw = () => {
          frame += 1;
          const nw = Math.max(2, Math.floor(canvasHost.clientWidth || 1));
          const nh = Math.max(2, Math.floor(canvasHost.clientHeight || 1));
          if (nw !== cw || nh !== ch) {
            cw = nw;
            ch = nh;
            p.resizeCanvas(cw, ch);
          }

          p.clear();
          p.blendMode(p.BLEND);
          p.noFill();
          const ink = readThemeInk();

          if (bannerMode === "plot") {
            if ((p.millis() - startAtMs) > 9200) {
              startAtMs = p.millis();
              reseedPlot();
            }

            const centerX = cw * 0.5;
            const centerY = ch * 0.5;
            p.stroke(ink[0], ink[1], ink[2], 64);
            p.strokeWeight(1);
            p.line(0, centerY, cw, centerY);
            p.line(centerX, 0, centerX, ch);

            for (let i = ghostFrames.length - 1; i >= 0; i -= 1) {
              const ghost = ghostFrames[i];
              ghost.alpha -= 6.4;
              if (ghost.alpha <= 2) ghostFrames.splice(i, 1);
            }

            for (const ghost of ghostFrames) {
              if (!ghost.points?.length) continue;
              p.noFill();
              p.stroke(ink[0], ink[1], ink[2], ghost.alpha);
              p.strokeWeight(1.05);
              p.beginShape();
              for (const pt of ghost.points) p.vertex(pt.x, pt.y);
              p.endShape();
            }

            p.noFill();
            p.stroke(ink[0], ink[1], ink[2], 224);
            p.strokeWeight(1.8);
            p.beginShape();
            const points = [];
            const steps = Math.max(46, Math.floor(cw / 2));
            const t = p.millis() / 1000;
            for (let i = 0; i <= steps; i += 1) {
              const u = i / steps;
              const x = p.lerp(0, cw, u);
              const xNorm = (u * 2) - 1;
              const y = centerY - evalMiniPlot(xNorm, t) * (ch * 0.33);
              points.push({ x, y });
              p.vertex(x, y);
            }
            p.endShape();

            ghostFrames.push({ points, alpha: 118 });
            if (ghostFrames.length > 18) ghostFrames.splice(0, ghostFrames.length - 18);
            return;
          }

          const cx = cw * 0.5;
          const cy = ch * 0.5;
          const minR = Math.max(4, Math.min(cw, ch) * 0.05);
          const maxR = Math.max(minR + 8, Math.min(ch * 0.46, cw * 0.46));

          for (let i = 0; i < ringCount; i += 1) {
            const localFrame = frame - (i * ringDelay);
            if (localFrame <= 0) continue;
            const cyclePos = (localFrame % cycleFrames) / cycleFrames;
            const radius = minR + (maxR - minR) * cyclePos;
            const alpha = 200 * Math.pow(1 - cyclePos, 1.15);
            const weight = 2.2 - (1.4 * cyclePos);
            p.stroke(ink[0], ink[1], ink[2], alpha);
            p.strokeWeight(Math.max(0.8, weight));
            p.circle(cx, cy, radius * 2);
          }
        };
      });
    }

          tempestGridEllipseY = p.random(0.84, 1.18);
          tempestGridTwist = p.random(-0.42, 0.42);
          tempestLaneScale = [];
          for (let i = 0; i < tempestLaneCount; i += 1) {
            tempestLaneScale.push(p.random(0.88, 1.14));
          }
          // Smooth lane scaling so generated grids are varied but still coherent.
          for (let pass = 0; pass < 2; pass += 1) {
            const smoothed = [];
            for (let i = 0; i < tempestLaneCount; i += 1) {
              const prev = tempestLaneScale[(i - 1 + tempestLaneCount) % tempestLaneCount];
              const cur = tempestLaneScale[i];
              const next = tempestLaneScale[(i + 1) % tempestLaneCount];
              smoothed[i] = (prev + cur + next) / 3;
            }
            tempestLaneScale = smoothed;
          }
          tempestPlayerLane = Math.floor(p.random(tempestLaneCount));
          tempestNextSpawnAt = p.millis() + p.random(420, 900);
          tempestNextShotAt = 0;
          tempestSpin = p.random(Math.PI * 2);
          tempestSpinVel = p.random() < 0.5 ? -p.random(0.0023, 0.0052) : p.random(0.0023, 0.0052);
          tempestCenterPulse = p.random(Math.PI * 2);
          const initial = Math.floor(p.random(5, 10));
          for (let i = 0; i < initial; i += 1) spawnTempestEnemy(p.random(0.03, 0.38));
        };

        const createPiGenerator = (digits = 120000) => {
          const len = Math.floor((digits * 10) / 3) + 1;
          return {
            arr: new Array(len).fill(2),
            len,
            nines: 0,
            predigit: 0
          };
        };

        const stepPiGenerator = (gen) => {
          let q = 0;
          for (let i = gen.len; i > 0; i -= 1) {
            const x = 10 * gen.arr[i - 1] + q * i;
            gen.arr[i - 1] = x % (2 * i - 1);
            q = Math.floor(x / (2 * i - 1));
          }
          gen.arr[0] = q % 10;
          q = Math.floor(q / 10);

          if (q === 9) {
            gen.nines += 1;
            return "";
          }
          if (q === 10) {
            const chunk = String(gen.predigit + 1) + "0".repeat(gen.nines);
            gen.predigit = 0;
            gen.nines = 0;
            return chunk;
          }
          let chunk = String(gen.predigit);
          gen.predigit = q;
          if (gen.nines) {
            chunk += "9".repeat(gen.nines);
            gen.nines = 0;
          }
          return chunk;
        };

        const refillPiQueue = (target = 32) => {
          if (!piGenerator) return;
          let guard = 0;
          while (piPendingDigits.length < target && guard < 200) {
            const chunk = stepPiGenerator(piGenerator);
            if (chunk.length) {
              for (let i = 0; i < chunk.length; i += 1) {
                const ch = chunk.charAt(i);
                if (!piDroppedLeadDigit) {
                  piDroppedLeadDigit = true;
                  continue;
                }
                piPendingDigits.push(ch);
                if (!piInsertedDot) {
                  piPendingDigits.push(".");
                  piInsertedDot = true;
                }
              }
            }
            guard += 1;
          }
        };

        const seedPiDigits = () => {
          piCols = 100;
          piGenerator = createPiGenerator();
          piPendingDigits = [];
          piDroppedLeadDigit = false;
          piInsertedDot = false;
          piLastEmitAt = 0;

          p.textFont("monospace");
          piCellWidth = p.width / piCols;
          piFontSize = 22;

          piColorRows = Array.from({ length: piRows }, () => new Array(piCols).fill([184, 214, 255]));

        const shuffleCircleTargets = () => {

          for (let i = 0; i < toggles; i += 1) {

        const seedMatrixRain = () => {

          matrixDirection = matrixDirections[Math.floor(p.random(matrixDirections.length))] || matrixDirections[0];

          placeMatrixDrop = (drop, initial = false) => {

            } else if (matrixDirection.name === "down") {

              drop.y = p.random(-margin, -20);
            } else if (matrixDirection.name === "right") {
              drop.x = p.random(-margin, -20);
              drop.y = p.random(0, p.height);
            } else if (matrixDirection.name === "left") {
              drop.x = p.random(p.width + 20, p.width + margin);
              drop.y = p.random(0, p.height);
            } else if (matrixDirection.name === "diag-bl-tr") {
              if (p.random() < 0.5) {
                drop.x = p.random(-margin, -20);
                drop.y = p.random(0, p.height + margin);
              } else {
                drop.x = p.random(0, p.width + margin);
                drop.y = p.random(p.height + 20, p.height + margin);
              }
            } else {
              if (p.random() < 0.5) {
                drop.x = p.random(p.width + 20, p.width + margin);
                drop.y = p.random(0, p.height + margin);
              } else {
                drop.x = p.random(0, p.width + margin);
                drop.y = p.random(p.height + 20, p.height + margin);
              }
            }

            if (initial && matrixDirection.name !== "meander") {
              const backfill = p.random(0, Math.max(p.width, p.height) * 1.2);
              drop.x -= matrixDirection.vx * backfill;
              drop.y -= matrixDirection.vy * backfill;
            }
          };

          for (let i = 0; i < streamCount; i += 1) {
            const drop = {
              x: 0,
              y: 0,
              speed: p.random(1.8, 4.2),
              length: Math.floor(p.random(10, 28)),
              vx: matrixDirection.vx,
              vy: matrixDirection.vy,
              turnRate: p.random(0.04, 0.12)
            };
            placeMatrixDrop(drop, true);
            matrixDrops.push(drop);
          }
        };

        const seedLife = () => {
          lifeCellSize = p.constrain(Math.floor(Math.min(p.width, p.height) / 72), 8, 14);
          lifeCols = Math.max(24, Math.floor(p.width / lifeCellSize));
          lifeRows = Math.max(16, Math.floor(p.height / lifeCellSize));
          const n = lifeCols * lifeRows;
          lifeGrid = new Uint8Array(n);
          lifeNext = new Uint8Array(n);
          lifeAge = new Uint16Array(n);
          lifeLastStepAt = 0;
          lifeStepMs = Math.round(p.random(95, 150));

          for (let y = 0; y < lifeRows; y += 1) {
            for (let x = 0; x < lifeCols; x += 1) {
              const i = y * lifeCols + x;
              // Dense-ish seeded field with softer edges.
              const edge = Math.min(x, y, lifeCols - x - 1, lifeRows - y - 1);
              const edgeFactor = p.constrain(edge / 8, 0.35, 1);
              lifeGrid[i] = p.random() < (0.26 * edgeFactor) ? 1 : 0;
            }
          }
        };

        const lifeNeighbors = (x, y) => {
          let count = 0;
          for (let dy = -1; dy <= 1; dy += 1) {
            for (let dx = -1; dx <= 1; dx += 1) {
              if (dx === 0 && dy === 0) continue;
              const nx = (x + dx + lifeCols) % lifeCols;
              const ny = (y + dy + lifeRows) % lifeRows;
              count += lifeGrid[ny * lifeCols + nx];
            }
          }
          return count;
        };

        const stepLife = () => {
          let aliveCount = 0;
          for (let y = 0; y < lifeRows; y += 1) {
            for (let x = 0; x < lifeCols; x += 1) {
              const i = y * lifeCols + x;
              const alive = lifeGrid[i] === 1;
              const n = lifeNeighbors(x, y);
              let nextAlive = 0;
              if (alive && (n === 2 || n === 3)) nextAlive = 1;
              if (!alive && n === 3) nextAlive = 1;
              lifeNext[i] = nextAlive;
              if (nextAlive) {
                lifeAge[i] = alive ? Math.min(60000, lifeAge[i] + 1) : 1;
                aliveCount += 1;
              } else {
                lifeAge[i] = 0;
              }
            }
          }

          const tmp = lifeGrid;
          lifeGrid = lifeNext;
          lifeNext = tmp;

          // Reseed if it dies out too far.
          if (aliveCount < (lifeCols * lifeRows * 0.02)) seedLife();
        };

        const seedCodeWriter = () => {
          codeFontSize = p.constrain(Math.floor(Math.min(p.width, p.height) / 56), 13, 18);
          codeLineHeight = Math.round(codeFontSize * 1.45);
          codeVisibleRows = Math.max(10, Math.floor((p.height - 40) / codeLineHeight));
          codeQueue = [];
          codeRendered = [];
          codeLineIndex = 0;
          codeCharIndex = 0;
          codeLastTypeAt = 0;
          codePauseUntil = 0;
          codeTypeInterval = p.random(22, 46);

          const templates = [
            "using System;",
            "using System.Collections.Generic;",
            "// Boot sequence for splash simulation",
            "namespace Toji.Studio;",
            "/// <summary>Simulates a terminal-like code stream.</summary>",
            "public sealed class SplashRenderer",
            "{",
            "    // Stores visible lines in the fake terminal.",
            "    private readonly List<string> _lines = new();",
            "    private readonly Random _rng = new();",
            "    public int Frame { get; private set; }",
            "    public void Tick()",
            "    {",
                "        Frame++;",
            "        if (Frame % 2 == 0) _lines.Add($\"frame:{Frame}\"); // type every other frame",
            "        if (_lines.Count > 120) _lines.RemoveAt(0);",
            "    }",
            "    // Returns a snapshot used by the painter.",
            "    public string[] Snapshot() => _lines.ToArray();",
            "}",
            "public static class ThemeService",
            "{",
            "    // Resolve desired UI theme mode.",
            "    public static string Resolve(string mode) =>",
            "        mode switch { \"dark\" => \"dark\", \"light\" => \"light\", _ => \"system\" };",
            "}",
            "// Minimal API sample",
            "var app = WebApplication.CreateBuilder(args).Build();",
            "app.MapGet(\"/api/health\", () => Results.Ok(new { status = \"ok\" }));",
            "app.MapPost(\"/api/save\", (Payload p) => Results.Json(p));",
            "app.Run();",
            "/// <remarks>Simple DTO for demo output.</remarks>",
            "public record Payload(string Title, string Body, DateTime UpdatedAt);"
          ];

          const totalLines = 180;
          for (let i = 0; i < totalLines; i += 1) {
            const raw = templates[Math.floor(p.random(templates.length))];
            const indent = " ".repeat(Math.floor(p.random(0, 4)) * 2);
            codeQueue.push(indent + raw);
          }
        };

        const seedPlot = () => {
          plotGhostFrames.length = 0;
          plotAmplitude = p.random(0.75, 1.35);
          plotFreq = p.random(0.8, 2.4);
          plotPhase = p.random(Math.PI * 2);
          const types = [
            "harmonic-rational",
            "chirped-damped",
            "nonlinear-wave",
            "sigmoid-oscillation"
          ];
          plotType = types[Math.floor(p.random(types.length))] || "sin";
          plotAxisColor = [p.random(90, 140), p.random(100, 150), p.random(120, 180)];
          plotLineColor = [p.random(120, 255), p.random(140, 255), p.random(160, 255)];
          plotParams = {};

          const A = plotAmplitude.toFixed(2);
          const W = plotFreq.toFixed(2);
          const P = plotPhase.toFixed(2);
          if (plotType === "harmonic-rational") {
            const b = p.random(0.25, 0.85);
            const h = p.random(1.8, 3.4);
            plotParams = { b, h };
            plotLabel = `f(x) = ${A}[sin(${W}pi x+${P}) + 0.45cos(${(plotFreq * h).toFixed(2)}pi x)] / (1+${b.toFixed(2)}x^2)`;
          } else if (plotType === "chirped-damped") {
            const chirp = p.random(0.6, 1.4);
            const damp = p.random(0.55, 1.35);
            const mix = p.random(0.2, 0.5);
            plotParams = { chirp, damp, mix };
            plotLabel = `f(x) = ${A}e^(-${damp.toFixed(2)}|x|) sin(${W}pi x + ${chirp.toFixed(2)}x^2 + ${P}) + ${mix.toFixed(2)}x`;
          } else if (plotType === "nonlinear-wave") {
            const c = p.random(0.35, 0.95);
            const d = p.random(0.9, 1.9);
            plotParams = { c, d };
            plotLabel = `f(x) = ${A}tanh(${d.toFixed(2)}x) sin(${W}pi x+${P}) + ${c.toFixed(2)}cos(3pi x)/(1+x^2)`;
          } else if (plotType === "sigmoid-oscillation") {
            const s = p.random(1.1, 2.4);
            const q = p.random(0.25, 0.7);
            plotParams = { s, q };
            plotLabel = `f(x) = ${A}(2/(1+e^(-${s.toFixed(2)}x))-1) + ${q.toFixed(2)}sin(${(plotFreq * 2).toFixed(2)}pi x + ${P})`;
          } else {
            plotLabel = `f(x) = ${A} sin(${W}pi x + ${P})`;
          }
        };

        const evalPlot = (xNorm, t) => {
          if (plotType === "harmonic-rational") {
            const b = Number(plotParams.b || 0.5);
            const h = Number(plotParams.h || 2.4);
            const num =
              Math.sin((xNorm * plotFreq * Math.PI) + plotPhase + t * 0.52) +
              0.45 * Math.cos((xNorm * plotFreq * Math.PI * h) - plotPhase * 0.35 + t * 0.28);
            return (plotAmplitude * num) / (1 + b * xNorm * xNorm * 2.4);
          }
          if (plotType === "chirped-damped") {
            const chirp = Number(plotParams.chirp || 1);
            const damp = Number(plotParams.damp || 1);
            const mix = Number(plotParams.mix || 0.35);
            const wave = Math.sin((xNorm * plotFreq * Math.PI) + (chirp * xNorm * xNorm * 1.5) + plotPhase + t * 0.58);
            const env = Math.exp(-damp * Math.abs(xNorm) * 1.1);
            return plotAmplitude * env * wave + mix * xNorm;
          }
          if (plotType === "nonlinear-wave") {
            const c = Number(plotParams.c || 0.6);
            const d = Number(plotParams.d || 1.2);
            return (
              plotAmplitude * Math.tanh(d * xNorm) * Math.sin((xNorm * plotFreq * Math.PI) + plotPhase + t * 0.48) +
              c * Math.cos((xNorm * Math.PI * 3.0) - t * 0.22) / (1 + xNorm * xNorm * 2.2)
            );
          }
          if (plotType === "sigmoid-oscillation") {
            const s = Number(plotParams.s || 1.7);
            const q = Number(plotParams.q || 0.4);
            const sig = 2 / (1 + Math.exp(-s * xNorm)) - 1;
            return plotAmplitude * sig + q * Math.sin((xNorm * plotFreq * Math.PI * 2) + plotPhase + t * 0.62);
          }
          return plotAmplitude * Math.sin((xNorm * plotFreq * Math.PI) + plotPhase + t * 0.7);
        };

        const spawnBounceBall = () => {
          const radius = p.random(12, 20);
          return {
            x: p.random(p.width * 0.25, p.width * 0.75),
            y: -radius - p.random(0, 40),
            vx: p.random(-1.35, 1.35),
            vy: p.random(0.4, 1.2),
            r: radius,
            gravity: p.random(0.28, 0.44),
            bounce: p.random(0.78, 0.88),
            drag: p.random(0.997, 0.9995),
            wasTouchingLogo: false,
            bottomBounces: 0,
            color: [
              Math.floor(p.random(90, 256)),
              Math.floor(p.random(90, 256)),
              Math.floor(p.random(90, 256))
            ]
          };
        };

        const seedBounce = () => {
          bounceBalls = [];
          bounceTrails = [];
          for (let i = 0; i < bounceBallCount; i += 1) {
            bounceBalls.push(spawnBounceBall());
          }
        };

        const circleIntersectsRect = (cx, cy, cr, rect) => {
          const nearestX = Math.max(rect.left, Math.min(cx, rect.right));
          const nearestY = Math.max(rect.top, Math.min(cy, rect.bottom));
          const dx = cx - nearestX;
          const dy = cy - nearestY;
          return (dx * dx + dy * dy) <= (cr * cr);
        };

        const steerTowards = (boid, target) => {
          const desired = p5.Vector.sub(target, boid.pos);
          const d = desired.mag();
          if (d < 0.001) return p.createVector(0, 0);
          desired.setMag(boid.maxSpeed);
          const steer = desired.sub(boid.vel);
          steer.limit(boid.maxForce);
          return steer;
        };

        const updateFlock = () => {
          const sensing = 74;
          const avoid = 28;

          const hasMouse = p.mouseX >= 0 && p.mouseX <= p.width && p.mouseY >= 0 && p.mouseY <= p.height;
          const target = hasMouse
            ? p.createVector(p.mouseX, p.mouseY)
            : p.createVector(p.width * 0.5, p.height * 0.5);
          mouseTarget.lerp(target, 0.16);

          for (const b of flock) {
            let total = 0;
            const align = p.createVector(0, 0);
            const cohesion = p.createVector(0, 0);
            const separation = p.createVector(0, 0);

            for (const other of flock) {
              if (other === b) continue;
              const d = p.dist(b.pos.x, b.pos.y, other.pos.x, other.pos.y);
              if (d <= 0 || d > sensing) continue;

              align.add(other.vel);
              cohesion.add(other.pos);
              total += 1;

              if (d < avoid) {
                const diff = p5.Vector.sub(b.pos, other.pos);
                diff.div(Math.max(d * d, 1));
                separation.add(diff);
              }
            }

            b.acc.mult(0);

            if (total > 0) {
              align.div(total).setMag(b.maxSpeed).sub(b.vel).limit(b.maxForce);
              cohesion.div(total);
              const cohForce = steerTowards(b, cohesion).mult(0.72);
              const sepForce = separation.setMag(b.maxSpeed).sub(b.vel).limit(b.maxForce * 1.4).mult(1.08);
              b.acc.add(align.mult(0.85));
              b.acc.add(cohForce);
              b.acc.add(sepForce);
            }

            const seek = steerTowards(b, mouseTarget).mult(1.25);
            b.acc.add(seek);
          }

          for (const b of flock) {
            b.vel.add(b.acc);
            b.vel.limit(b.maxSpeed);
            b.pos.add(b.vel);

            if (b.pos.x < -10) b.pos.x = p.width + 10;
            if (b.pos.x > p.width + 10) b.pos.x = -10;
            if (b.pos.y < -10) b.pos.y = p.height + 10;
            if (b.pos.y > p.height + 10) b.pos.y = -10;
          }
        };

        const drawFlock = () => {
          p.noStroke();
          for (const b of flock) {
            const theta = b.vel.heading() + p.HALF_PI;
            p.push();
            p.translate(b.pos.x, b.pos.y);
            p.rotate(theta);
            if (b.purple) p.fill(170, 98, 255, 210);
            else p.fill(245, 245, 245, 205);
            p.triangle(0, -b.size * 1.45, -b.size * 0.9, b.size, b.size * 0.9, b.size);
