<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Toji Studios</title>
  <link rel="stylesheet" href="assets/css/site.css" />
  <style>
    body.home-animated{
      background:
        radial-gradient(1200px 700px at 12% 18%, rgba(96, 130, 255, .22), transparent 62%),
        radial-gradient(900px 560px at 84% 12%, rgba(92, 255, 214, .16), transparent 58%),
        radial-gradient(1000px 640px at 70% 82%, rgba(255, 140, 86, .12), transparent 62%),
        radial-gradient(900px 560px at 22% 88%, rgba(150, 110, 255, .14), transparent 60%),
        var(--bg);
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: 125% 125%, 115% 115%, 120% 120%, 110% 110%, auto;
      animation: homeAmbientShift 16s ease-in-out infinite alternate;
    }
    @keyframes homeAmbientShift{
      0%{
        background-position: 0% 0%, 100% 0%, 100% 100%, 0% 100%, 0 0;
      }
      100%{
        background-position: 8% 6%, 92% 8%, 94% 90%, 8% 94%, 0 0;
      }
    }
    html[data-theme="light"] body.home-animated{
      background:
        radial-gradient(1200px 700px at 12% 18%, rgba(47, 91, 255, .16), transparent 62%),
        radial-gradient(900px 560px at 84% 12%, rgba(17, 166, 139, .12), transparent 58%),
        radial-gradient(1000px 640px at 70% 82%, rgba(255, 112, 44, .10), transparent 62%),
        radial-gradient(900px 560px at 22% 88%, rgba(121, 97, 255, .10), transparent 60%),
        var(--bg);
    }
    @media (prefers-reduced-motion: reduce){
      body.home-animated{ animation: none; }
    }
    #latestGrid{
      gap: 12px;
    }
    #featuredStrip .card{
      width: 100%;
      max-width: 300px;
    }
    #featuredStrip .thumb img{
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      background: var(--bg);
    }
    #latestGrid .card{
      width: 100%;
      min-width: 0;
      max-width: none;
    }
  </style>
</head>

<body class="home-animated">
  <header id="siteHeader"></header>

  <main class="container">
    <section class="hero">
      <h1>Toji Studios</h1>
      <p>Abstract, cosmic-leaning digital artwork—geometry, atmosphere, and controlled chaos.</p>
      <div class="cta">
        <a class="btn primary" href="gallery.html">Explore the Gallery</a>
        <a class="btn" href="contact.html">Inquire</a>
      </div>
    </section>

    <!-- Featured strip -->
    <section id="featuredSection" style="display:none">
      <div class="section-title">
        <h2>Featured</h2>
        <span id="featuredHint">—</span>
      </div>

      <div id="featuredStrip"
        style="display:flex; gap:14px; overflow:auto; padding-bottom:10px; scroll-snap-type:x mandatory;"
        aria-label="Featured artworks"></div>
    </section>

    <!-- Latest works -->
    <section id="latestSection" style="display:none">
    <div class="section-title" style="margin-top:28px">
      <h2>Latest</h2>
      <span id="latestHint">—</span>
    </div>

    <section class="grid" id="latestGrid" aria-label="Latest artworks"></section>
    </section>

    <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:18px">
      <a class="btn primary" href="gallery.html">View all works</a>
      <a class="btn" href="contact.html">Licensing / commissions</a>
    </div>
  </main>

  <footer id="siteFooter"></footer>

  <script type="module">
    import { renderPublicHeader } from "./assets/js/header.js";
    import { renderPublicFooter } from "./assets/js/footer.js";

    renderPublicHeader({ active: "home", small: "home", ctaText: "Explore", ctaHref: "gallery.html" });
    renderPublicFooter({
      rightHtml: `<a href="index.html">Home</a> • <a href="gallery.html">Gallery</a> • <a href="series.html">Series</a> • <a href="contact.html">Contact</a> • <a href="admin/index.html">Studio</a>`
    });

    // ---- Data source: Admin localStorage first, fallback JSON ----
    const ADMIN_STORAGE_KEY = "toji_admin_state_v1";
    const HOME_LATEST_VISIBLE_KEY = "toji_home_latest_visible_v1";
    const FALLBACK_URL = "assets/data/admin.sample.json";

    async function loadPublished() {
      const saved = localStorage.getItem(ADMIN_STORAGE_KEY);
      if (saved) {
        try {
          const state = JSON.parse(saved);
          return (state.artworks || []).filter(a => a.status === "published");
        } catch {
          // fall through
        }
      }
      const res = await fetch(FALLBACK_URL, { cache: "no-store" });
      const json = await res.json();
      return (json.artworks || []).filter(a => a.status === "published");
    }

    function sortGallery(items) {
      return items.slice().sort((a, b) => {
        // Featured first
        const fa = !!a.featured, fb = !!b.featured;
        if (fa !== fb) return fb - fa;
        // sortOrder desc
        const soA = Number(a.sortOrder || 0), soB = Number(b.sortOrder || 0);
        if (soA !== soB) return soB - soA;
        // dates desc
        const da = (a.publishedAt || a.createdAt || ""), db = (b.publishedAt || b.createdAt || "");
        return String(db).localeCompare(String(da));
      });
    }

    function el(tag, attrs = {}, ...children) {
      const n = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === "class") n.className = v;
        else if (k === "style") n.setAttribute("style", v);
        else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2), v);
        else if (v !== undefined && v !== null) n.setAttribute(k, v);
      }
      for (const c of children.flat()) {
        if (c == null) continue;
        n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
      }
      return n;
    }

    // ---- Lightbox (same behavior as gallery) ----
    const lightbox = createLightbox();
    document.body.appendChild(lightbox.host);

    let currentList = [];
    let currentIndex = -1;

    function openLightbox(list, idx) {
      currentList = list;
      currentIndex = idx;
      lightbox.open(currentList[currentIndex]);
    }

    function next() {
      if (!currentList.length) return;
      currentIndex = (currentIndex + 1) % currentList.length;
      lightbox.open(currentList[currentIndex]);
    }

    function prev() {
      if (!currentList.length) return;
      currentIndex = (currentIndex - 1 + currentList.length) % currentList.length;
      lightbox.open(currentList[currentIndex]);
    }

    function createLightbox() {
      const style = document.createElement("style");
      style.textContent = `
        .lb-backdrop{
          position:fixed; inset:0; z-index:1000;
          background: rgba(0,0,0,.72);
          display:none; align-items:center; justify-content:center;
          padding: 24px;
        }
        [data-theme="light"] .lb-backdrop{ background: rgba(0,0,0,.55); }

        .lb{
          width:min(1100px, 96vw);
          border:1px solid var(--line);
          border-radius: var(--radius);
          background: var(--panel);
          box-shadow: var(--shadow);
          overflow:hidden;
        }
        .lb-top{
          display:flex; align-items:center; justify-content:space-between;
          gap:10px;
          padding:12px 12px;
          border-bottom:1px solid var(--line);
        }
        .lb-title{ font-weight:650; }
        .lb-body{
          display:grid;
          grid-template-columns: 1fr 320px;
          gap: 0;
        }
        .lb-media{
          background: rgba(255,255,255,.03);
          display:flex; align-items:center; justify-content:center;
          min-height: 56vh;
        }
        .lb-media img{
          width:100%;
          height:100%;
          max-height: 76vh;
          object-fit: contain;
          background: var(--bg);
        }
        .lb-meta{
          padding:14px;
          border-left:1px solid var(--line);
        }
        .lb-meta .sub{ margin-top:8px; }
        .lb-actions{ display:flex; gap:8px; flex-wrap:wrap; }
        .lb-actions .btn{ padding:8px 10px; font-size:13px; }
        @media (max-width: 920px){
          .lb-body{ grid-template-columns: 1fr; }
          .lb-meta{ border-left:0; border-top:1px solid var(--line); }
        }
      `;
      document.head.appendChild(style);

      const backdrop = el("div", { class: "lb-backdrop", role: "dialog", "aria-modal": "true" });

      const title = el("div", { class: "lb-title" }, "");
      const closeBtn = el("button", { class: "btn", type: "button" }, "Close");
      const prevBtn = el("button", { class: "btn", type: "button" }, "Prev");
      const nextBtn = el("button", { class: "btn", type: "button" }, "Next");

      const top = el("div", { class: "lb-top" },
        title,
        el("div", { class: "lb-actions" }, prevBtn, nextBtn, closeBtn)
      );

      const img = el("img", { alt: "" });
      const media = el("div", { class: "lb-media" }, img);

      const metaTitle = el("div", { style: "font-weight:650" }, "");
      const metaSub = el("div", { class: "sub" }, "");
      const metaDesc = el("div", { class: "sub", style: "font-size:15px; line-height:1.65" }, "");

      const meta = el("div", { class: "lb-meta" }, metaTitle, metaSub, el("hr", { class: "sep" }), metaDesc);

      const body = el("div", { class: "lb-body" }, media, meta);
      const panel = el("div", { class: "lb" }, top, body);

      backdrop.appendChild(panel);

      let lastActive = null;

      function open(item) {
        lastActive = document.activeElement;

        title.textContent = item.title || "Untitled";
        metaTitle.textContent = item.title || "Untitled";

        const bits = [
          item.series ? item.series : null,
          item.year ? item.year : null,
          item.featured ? "Featured" : null
        ].filter(Boolean).join(" • ");

        metaSub.textContent = bits || "";
        metaDesc.textContent = item.description || "";

        img.src = item.image || item.thumb || "";
        img.alt = item.alt || item.title || "Artwork";

        backdrop.style.display = "flex";
        closeBtn.focus();
      }

      function close() {
        backdrop.style.display = "none";
        if (lastActive && typeof lastActive.focus === "function") lastActive.focus();
      }

      backdrop.addEventListener("click", (e) => {
        if (e.target === backdrop) close();
      });

      closeBtn.addEventListener("click", close);
      nextBtn.addEventListener("click", () => next());
      prevBtn.addEventListener("click", () => prev());

      document.addEventListener("keydown", (e) => {
        if (backdrop.style.display !== "flex") return;
        if (e.key === "Escape") close();
        if (e.key === "ArrowRight") next();
        if (e.key === "ArrowLeft") prev();
      });

      return { host: backdrop, open, close };
    }

    // ---- Render UI ----
    const featuredSection = document.getElementById("featuredSection");
    const featuredStrip = document.getElementById("featuredStrip");
    const featuredHint = document.getElementById("featuredHint");

    const latestSection = document.getElementById("latestSection");
    const latestGrid = document.getElementById("latestGrid");
    const latestHint = document.getElementById("latestHint");
    const isLatestVisible = localStorage.getItem(HOME_LATEST_VISIBLE_KEY) === "1";
    latestSection.style.display = isLatestVisible ? "" : "none";

    const all = sortGallery(await loadPublished());

    const featured = sortGallery(all.filter(a => a.featured));
    renderFeatured(featured);

    // Latest (excluding featured duplicates)
    if (isLatestVisible) {
      const latest = sortGallery(all.filter(a => !a.featured)).slice(0, 9);
      renderLatest(latest);
    }

    function renderFeatured(items) {
      featuredStrip.innerHTML = "";

      if (!items.length) {
        featuredSection.style.display = "none";
        return;
      }

      featuredSection.style.display = "";
      featuredHint.textContent = `${items.length} piece${items.length === 1 ? "" : "s"}`;

      items.forEach((a, idx) => {
        const card = el("a", {
          class: "card",
          href: `artwork.html?id=${encodeURIComponent(a.id)}`,
          style: `
            min-width: 220px;
            max-width: 300px;
            scroll-snap-align:start;
            box-shadow:none;
          `,
          //onclick: null // (e)=>{ e.preventDefault(); openLightbox(items, idx); }
          onclick: (e)=>{ e.preventDefault(); openLightbox(items, idx); }
        },
          el("div", { class: "thumb", style: "aspect-ratio: 16/10" },
            el("img", { src: a.thumb || a.image, alt: a.alt || a.title || "Artwork", loading: "lazy" })
          ),
          el("div", { class: "meta" },
            el("p", { class: "title" }, a.title || "Untitled"),
            el("p", { class: "sub" }, [a.series || null, a.year || null].filter(Boolean).join(" • ") || " ")
          )
        );

        featuredStrip.appendChild(card);
      });
    }

    function renderLatest(items) {
      latestGrid.innerHTML = "";
      latestHint.textContent = `${items.length} piece${items.length === 1 ? "" : "s"}`;

      if (!items.length) {
        latestGrid.appendChild(
          el("div", { class: "card", style: "grid-column: span 12; box-shadow:none" },
            el("div", { class: "meta" },
              el("p", { class: "title" }, "No published work yet"),
              el("p", { class: "sub" }, "Publish pieces in Studio to populate the homepage.")
            )
          )
        );
        return;
      }

      items.forEach((a, idx) => {
        const card = el("a", {
          class: "card",
          href: `artwork.html?id=${encodeURIComponent(a.id)}`,
          style: `
            grid-column: span 4;
            box-shadow:none;
          `,
          onclick:(e)=>{ e.preventDefault(); openLightbox(items, idx); }
        },
          el("div", { class: "thumb", style: "aspect-ratio: 16/10" },
            el("img", { src: a.thumb || a.image, alt: a.alt || a.title || "Artwork", loading: "lazy" })
          ),
          el("div", { class: "meta" },
            el("p", { class: "title" }, a.title || "Untitled"),
            el("p", { class: "sub" }, [a.series || null, a.year || null].filter(Boolean).join(" • ") || " ")
          )
        );

        latestGrid.appendChild(card);
      });

      // Responsive spans
      const mq1 = window.matchMedia("(max-width: 920px)");
      const mq2 = window.matchMedia("(max-width: 620px)");
      const applySpans = () => {
        const span = mq2.matches ? 12 : (mq1.matches ? 6 : 4);
        latestGrid.querySelectorAll(".card").forEach(c => c.style.gridColumn = `span ${span}`);
      };
      applySpans();
      mq1.onchange = applySpans;
      mq2.onchange = applySpans;
    }
  </script>
</body>

</html>
