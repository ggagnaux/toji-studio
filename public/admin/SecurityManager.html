<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Studio - Security Manager</title>
  <link rel="stylesheet" href="../assets/css/site.css" />
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a class="brand" href="../index.html">
        <span class="brand-logo-combo" aria-hidden="true">
          <span class="brand-logo-icon-stack">
            <img class="brand-logo-icon-image" src="../assets/img/TojiStudios-Logo.png" alt="" />
          </span>
          <span class="brand-logo-wordmark-stack">
            <img class="brand-logo-wordmark-image brand-logo-wordmark-image--for-dark" src="../assets/img/TojiStudios-Light-TextOnly.png" alt="" />
            <img class="brand-logo-wordmark-image brand-logo-wordmark-image--for-light" src="../assets/img/TojiStudios-Dark-TextOnly.png" alt="" />
          </span>
        </span>
        <span class="sr-only">Toji Studios</span>
      </a>

      <nav class="navlinks" aria-label="Primary">
        <a href="../index.html">Public</a>
        <a class="active" href="index.html">Studio</a>
      </nav>

      <div class="theme-controls">
        <div class="segmented" role="group" aria-label="Theme mode">
          <button type="button" data-theme-mode="system">System</button>
          <button type="button" data-theme-mode="light">Light</button>
          <button type="button" data-theme-mode="dark">Dark</button>
        </div>
        <button class="icon-btn" type="button" data-theme-icon aria-label="Toggle theme"></button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero" style="padding-bottom:10px">
      <h1>Security Manager</h1>
      <p>Manage admin account security settings.</p>
    </section>

    <div class="admin-layout">
      <aside class="sidebar" aria-label="Studio navigation">
        <a href="index.html">Image Manager</a>
        <a href="upload.html">Upload</a>
        <a href="series.html">Series Manager</a>
        <a href="linkmanager.html">Link Manager</a>
        <a href="HomePageManager.html">Home Page Manager</a>
        <a href="OtherSettings.html">Other Settings</a>
        <a class="active" href="SecurityManager.html">Security Manager</a>
      </aside>

      <section>
        <article class="card">
          <div class="meta">
            <p class="title" style="margin:0">Admin Password</p>
            <p class="sub" style="margin-top:8px">Change the password used to sign in to admin pages.</p>

            <form id="adminPasswordForm" style="display:grid; gap:10px; margin-top:12px; max-width:560px">
              <label class="field">
                <div class="sub">Current password</div>
                <input id="currentAdminPassword" type="password" autocomplete="current-password" required />
              </label>
              <label class="field">
                <div class="sub">New password</div>
                <input id="newAdminPassword" type="password" autocomplete="new-password" required />
              </label>
              <label class="field">
                <div class="sub">Confirm new password</div>
                <input id="confirmAdminPassword" type="password" autocomplete="new-password" required />
              </label>

              <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                <button class="btn primary" type="submit">Change password</button>
                <button class="btn" id="resetAdminPassword" type="button">Reset to default</button>
                <span class="sub" id="passwordStatus" aria-live="polite"></span>
              </div>
            </form>
          </div>
        </article>

        <footer class="footer">
          <div class="row">
            <div>© <span id="y"></span> Toji Studios</div>
            <div>Security Manager</div>
          </div>
        </footer>
      </section>
    </div>
  </main>

  <script type="module">
    import { applyBannerLogoBehavior } from "../assets/js/header.js";
    import {
      ensureBaseStyles,
      setYearFooter,
      showToast,
      getExpectedAdminPassword,
      setAdminPassword,
      ADMIN_DEFAULT_PASSWORD
    } from "./admin.js";

    ensureBaseStyles();
    setYearFooter();
    applyBannerLogoBehavior(document.querySelector("header.header"));

    const adminPasswordForm = document.getElementById("adminPasswordForm");
    const currentAdminPassword = document.getElementById("currentAdminPassword");
    const newAdminPassword = document.getElementById("newAdminPassword");
    const confirmAdminPassword = document.getElementById("confirmAdminPassword");
    const passwordStatus = document.getElementById("passwordStatus");
    const resetAdminPassword = document.getElementById("resetAdminPassword");

    adminPasswordForm?.addEventListener("submit", (e) => {
      e.preventDefault();
      const current = String(currentAdminPassword?.value || "");
      const next = String(newAdminPassword?.value || "").trim();
      const confirm = String(confirmAdminPassword?.value || "").trim();

      if (current !== getExpectedAdminPassword()) {
        if (passwordStatus) passwordStatus.textContent = "Current password is incorrect.";
        showToast("Current password is incorrect.", { tone: "warn" });
        return;
      }
      if (next.length < 6) {
        if (passwordStatus) passwordStatus.textContent = "Use at least 6 characters.";
        showToast("New password must be at least 6 characters.", { tone: "warn" });
        return;
      }
      if (next !== confirm) {
        if (passwordStatus) passwordStatus.textContent = "New passwords do not match.";
        showToast("New passwords do not match.", { tone: "warn" });
        return;
      }

      setAdminPassword(next);
      if (passwordStatus) passwordStatus.textContent = "Admin password updated.";
      if (currentAdminPassword) currentAdminPassword.value = "";
      if (newAdminPassword) newAdminPassword.value = "";
      if (confirmAdminPassword) confirmAdminPassword.value = "";
      showToast("Admin password updated.", { tone: "success" });
    });

    resetAdminPassword?.addEventListener("click", () => {
      setAdminPassword("");
      if (passwordStatus) passwordStatus.textContent = `Password reset to default (${ADMIN_DEFAULT_PASSWORD}).`;
      if (currentAdminPassword) currentAdminPassword.value = "";
      if (newAdminPassword) newAdminPassword.value = "";
      if (confirmAdminPassword) confirmAdminPassword.value = "";
      showToast(`Password reset to default: ${ADMIN_DEFAULT_PASSWORD}`, { tone: "success" });
    });
  </script>
</body>
</html>
