<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Studio - Security Manager</title>
  <link rel="stylesheet" href="../assets/css/site.css" />
</head>
<body>
  <header id="siteHeader"></header>

  <main class="container">
    <section class="hero" style="padding-bottom:10px">
      <h1>Security Manager</h1>
      <p>Manage admin account security settings.</p>
    </section>

    <div class="admin-layout">
      <aside class="sidebar" aria-label="Studio navigation">
        <a href="index.html">Image Manager</a>
        <a href="upload.html">Upload</a>
        <a href="series.html">Series Manager</a>
        <a href="linkmanager.html">Link Manager</a>
        <a href="HomePageManager.html">Home Page Manager</a>
        <a href="SocialMediaManager.html">Social Media Manager</a>
        <a href="OtherSettings.html">Other Settings</a>
        <a class="active" href="SecurityManager.html">Security Manager</a>
      </aside>

      <section>
        <article class="card">
          <div class="meta">
            <p class="title" style="margin:0">Admin Password</p>
            <p class="sub" style="margin-top:8px">Change the password used to sign in to admin pages.</p>

            <form id="adminPasswordForm" style="display:grid; gap:10px; margin-top:12px; max-width:560px">
              <label class="field">
                <div class="sub">Current password</div>
                <input id="currentAdminPassword" type="password" autocomplete="current-password" required />
              </label>
              <label class="field">
                <div class="sub">New password</div>
                <input id="newAdminPassword" type="password" autocomplete="new-password" required />
              </label>
              <label class="field">
                <div class="sub">Confirm new password</div>
                <input id="confirmAdminPassword" type="password" autocomplete="new-password" required />
              </label>

              <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                <button class="btn primary" type="submit">Change password</button>
                <button class="btn" id="resetAdminPassword" type="button">Reset to default</button>
                <span class="sub" id="passwordStatus" aria-live="polite"></span>
              </div>
            </form>
          </div>
        </article>

        <footer id="siteFooter"></footer>
      </section>
    </div>
  </main>

  <script type="module" src="./js/security-manager.js"></script>
</body>
</html>
