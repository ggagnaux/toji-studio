<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Studio — Edit</title>
  <link rel="stylesheet" href="../assets/css/site.css" />
  <style>
    .file-picker-shell{
      border: 1px dashed color-mix(in srgb, var(--accent) 48%, var(--line));
      border-radius: 14px;
      background:
        linear-gradient(
          130deg,
          color-mix(in srgb, var(--accent-soft) 60%, transparent),
          color-mix(in srgb, var(--panel) 86%, transparent)
        );
      padding: 10px;
      transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease;
    }
    .file-picker-shell:hover{
      border-color: color-mix(in srgb, var(--accent) 72%, var(--line));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
      transform: translateY(-1px);
    }
    .file-picker-shell:focus-within{
      border-color: color-mix(in srgb, var(--accent) 85%, var(--line));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 28%, transparent);
    }
    .file-picker-shell-flash{
      animation: filePickerFlash .72s ease-in-out 1;
    }
    @keyframes filePickerFlash{
      0%{
        border-color: color-mix(in srgb, var(--accent) 48%, var(--line));
        box-shadow: 0 0 0 0 color-mix(in srgb, #d15353 0%, transparent);
        background:
          linear-gradient(
            130deg,
            color-mix(in srgb, var(--accent-soft) 60%, transparent),
            color-mix(in srgb, var(--panel) 86%, transparent)
          );
      }
      25%{
        border-color: color-mix(in srgb, #d15353 78%, var(--line));
        box-shadow: 0 0 0 5px color-mix(in srgb, #d15353 36%, transparent);
        background: color-mix(in srgb, #ffb2b2 34%, var(--panel));
      }
      50%{
        border-color: color-mix(in srgb, var(--accent) 48%, var(--line));
        box-shadow: 0 0 0 0 color-mix(in srgb, #d15353 0%, transparent);
        background:
          linear-gradient(
            130deg,
            color-mix(in srgb, var(--accent-soft) 60%, transparent),
            color-mix(in srgb, var(--panel) 86%, transparent)
          );
      }
      75%{
        border-color: color-mix(in srgb, #d15353 78%, var(--line));
        box-shadow: 0 0 0 5px color-mix(in srgb, #d15353 36%, transparent);
        background: color-mix(in srgb, #ffb2b2 34%, var(--panel));
      }
      100%{
        border-color: color-mix(in srgb, var(--accent) 48%, var(--line));
        box-shadow: 0 0 0 0 color-mix(in srgb, #d15353 0%, transparent);
        background:
          linear-gradient(
            130deg,
            color-mix(in srgb, var(--accent-soft) 60%, transparent),
            color-mix(in srgb, var(--panel) 86%, transparent)
          );
      }
    }
    #replaceFile{
      width: 100%;
      border: 0;
      background: transparent;
      padding: 4px;
      color: var(--text);
      font-size: 14px;
      min-height: 46px;
    }
    #replaceFile::file-selector-button{
      border: 1px solid var(--accent-border);
      background: var(--accent-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      margin-right: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }
    #replaceFile::file-selector-button:hover{
      border-color: color-mix(in srgb, var(--accent) 86%, var(--line));
      background: color-mix(in srgb, var(--accent-soft) 70%, var(--panel));
      transform: translateY(-1px);
    }
    #replaceFile::-webkit-file-upload-button{
      border: 1px solid var(--accent-border);
      background: var(--accent-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      margin-right: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a class="brand" href="../index.html">
        <span class="brand-logo-combo" aria-hidden="true">
          <span class="brand-logo-icon-stack">
            <img class="brand-logo-icon-image" src="../assets/img/TojiStudios-Logo.png" alt="" />
          </span>
          <span class="brand-logo-wordmark-stack">
            <img class="brand-logo-wordmark-image brand-logo-wordmark-image--for-dark" src="../assets/img/TojiStudios-Light-TextOnly.png" alt="" />
            <img class="brand-logo-wordmark-image brand-logo-wordmark-image--for-light" src="../assets/img/TojiStudios-Dark-TextOnly.png" alt="" />
          </span>
        </span>
        <span class="sr-only">Toji Studios</span>
      </a>

      <nav class="navlinks" aria-label="Primary">
        <a href="../index.html">Public</a>
        <a href="index.html">Studio</a>
      </nav>

      <div class="theme-controls">
        <div class="segmented" role="group" aria-label="Theme mode">
          <button type="button" data-theme-mode="system">System</button>
          <button type="button" data-theme-mode="light">Light</button>
          <button type="button" data-theme-mode="dark">Dark</button>
        </div>
        <button class="icon-btn" type="button" data-theme-icon aria-label="Toggle theme"></button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero" style="padding-bottom:10px">
      <button class="btn mini" id="backNavBtn" type="button" style="margin-bottom:10px">Back</button>
      <h1 id="h1">Edit artwork</h1>
      <p class="sub" id="sub">—</p>
    </section>

    <section class="grid" id="root"></section>

    <footer class="footer">
      <div class="row">
        <div>© <span id="y"></span> Toji Studios</div>
        <div>Edit view</div>
      </div>
    </footer>
  </main>

  <script type="module" src="./js/edit.js"></script>
</body>
</html>
