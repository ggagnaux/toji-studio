<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="js/admin-session-guard.js"></script>
  <title>Studio — Series</title>
  <link rel="stylesheet" href="../assets/css/site.css" />
  <style>
    #seriesManagerGrid{
      grid-template-columns:minmax(360px, 4.8fr) minmax(0, 7.2fr);
      align-items:start;
    }
    #seriesListCard,
    #seriesEditorCard{
      grid-column:auto !important;
    }
    @media (max-width: 1180px){
      #seriesManagerGrid{
        grid-template-columns:minmax(360px, 1fr);
      }
      #seriesListCard,
      #seriesEditorCard{
        grid-column:span 1 !important;
      }
    }
    @media (max-width: 760px){
      #seriesManagerGrid{
        grid-template-columns:minmax(0, 1fr);
      }
      #seriesListCard,
      #seriesEditorCard{
        grid-column:span 1 !important;
      }
    }
    #seriesEditorCard .series-editor-tab,
    #seriesEditorCard .tab{
      border-top-left-radius:10px;
      border-top-right-radius:10px;
      border-bottom-left-radius:0;
      border-bottom-right-radius:0;
    }
    #seriesListCard .btn,
    #seriesEditorCard .btn{
      min-height:32px;
      border-radius:10px;
      font-size:13px;
      font-weight:650;
    }
    #seriesListCard input,
    #seriesEditorCard input,
    #seriesEditorCard textarea,
    #seriesEditorCard select{
      border-radius:10px;
      background:color-mix(in srgb, var(--panel) 98%, transparent);
      box-shadow:none;
    }
  </style>
</head>
<body>
  <header id="siteHeader"></header>

  <main class="container">
    <section class="hero" style="padding-bottom:10px">
      <h1>Series Manager</h1>
      <p>Manage series metadata: ordering, description, public visibility, and a cover image.</p>
    </section>

    <div class="admin-layout">
      <aside class="sidebar" aria-label="Studio navigation"></aside>
      <section>
    <section class="grid" id="seriesManagerGrid">
      <!-- Left: list -->
      <div class="card" id="seriesListCard" style="grid-column: span 3">
        <div class="meta">
          <div style="display:flex; gap:10px; align-items:baseline; justify-content:space-between; flex-wrap:wrap">
            <p class="title" style="margin:0">Series</p>
            <span class="sub" id="count">—</span>
          </div>

          <div class="field series-floating-field" id="newNameField" style="margin-top:12px">
            <input id="newName" placeholder=" " aria-label="New series name" />
            <label class="series-floating-label" for="newName">New series name</label>
          </div>

          <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; align-items:center">
            <button class="btn primary" id="createBtn" type="button">Create</button>
            <span class="sub" id="status" aria-live="polite"></span>
          </div>

          <div style="display:flex; gap:10px; align-items:center; margin-top:12px">
            <label class="sub" style="display:flex; align-items:center; gap:10px; cursor:pointer; white-space:nowrap; user-select:none;">
              <span style="position:relative; display:inline-flex; width:46px; height:26px; flex:0 0 auto;">
                <input id="showHidden" type="checkbox" style="position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0; margin:-1px; padding:0;" />
                <span data-show-hidden-track aria-hidden="true" style="width:100%; height:100%; border-radius:999px; border:1px solid var(--line); background:color-mix(in srgb, var(--panel) 84%, transparent); position:relative; transition:background .18s ease, border-color .18s ease;">
                  <span data-show-hidden-knob style="position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:var(--text); transition:transform .18s ease;"></span>
                </span>
              </span>
              Show hidden series
            </label>
          </div>

          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:10px">
            <button class="btn" id="selectAllBtn" type="button">Select all</button>
            <button class="btn" id="selectVisibleBtn" type="button">Select visible</button>
            <button class="btn" id="clearSelectionBtn" type="button">Clear selection</button>
            <button class="btn" id="deleteSelectedBtn" type="button">Delete selected</button>
            <span class="sub" id="selectionCount" aria-live="polite"></span>
          </div>

          <hr class="sep" />

          <div id="list" style="display:grid; gap:10px"></div>
        </div>
      </div>

      <!-- Right: editor -->
      <div class="card" id="seriesEditorCard" style="grid-column: span 9; overflow: visible;">
        <div class="meta" id="editor">
          <p class="title" style="margin:0">Select a series</p>
          <p class="sub" style="margin-top:8px">Pick a series on the left to edit its metadata.</p>
        </div>
      </div>
    </section>

    <footer id="siteFooter"></footer>
      </section>
    </div>
  </main>

  <script type="module" src="./js/series.js"></script>
</body>
</html>
