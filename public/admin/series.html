<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Studio — Series</title>
  <link rel="stylesheet" href="../assets/css/site.css" />
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a class="brand" href="../index.html">
        <img class="brand-logo-image" src="../assets/img/TojiStudios_LogoAndName_ForWebsite.png" alt="Toji Studios" />
      </a>


      <nav class="navlinks" aria-label="Primary">
        <a href="../index.html">Public</a>
        <a href="index.html">Studio</a>
        <a href="upload.html">Upload</a>
        <a class="active" href="series.html">Series</a>
      </nav>

      <div class="theme-controls">
        <div class="segmented" role="group" aria-label="Theme mode">
          <button type="button" data-theme-mode="system">System</button>
          <button type="button" data-theme-mode="light">Light</button>
          <button type="button" data-theme-mode="dark">Dark</button>
        </div>
        <button class="icon-btn" type="button" data-theme-icon aria-label="Toggle theme"></button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero" style="padding-bottom:10px">
      <h1>Series Manager</h1>
      <p>Manage series metadata: ordering, description, public visibility, and a cover image.</p>
    </section>

    <section class="grid">
      <!-- Left: list -->
      <div class="card" style="grid-column: span 5">
        <div class="meta">
          <div style="display:flex; gap:10px; align-items:baseline; justify-content:space-between; flex-wrap:wrap">
            <p class="title" style="margin:0">Series</p>
            <span class="sub" id="count">—</span>
          </div>

          <div class="field" style="margin-top:12px">
            <div class="sub">New series name</div>
            <input id="newName" placeholder="e.g., Dark Fields" />
          </div>

          <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; align-items:center">
            <button class="btn primary" id="createBtn" type="button">Create</button>
            <span class="sub" id="status" aria-live="polite"></span>
          </div>

          <div style="display:flex; gap:10px; align-items:center; margin-top:12px">
            <label class="sub" style="display:flex; align-items:center; gap:8px; cursor:pointer; white-space:nowrap">
              <input id="showHidden" type="checkbox" />
              Show hidden series
            </label>
          </div>

          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:10px">
            <button class="btn" id="selectAllBtn" type="button">Select all</button>
            <button class="btn" id="selectVisibleBtn" type="button">Select visible</button>
            <button class="btn" id="clearSelectionBtn" type="button">Clear selection</button>
            <button class="btn" id="deleteSelectedBtn" type="button">Delete selected</button>
            <span class="sub" id="selectionCount" aria-live="polite"></span>
          </div>

          <hr class="sep" />

          <div id="list" style="display:grid; gap:10px"></div>
        </div>
      </div>

      <!-- Right: editor -->
      <div class="card" style="grid-column: span 7">
        <div class="meta" id="editor">
          <p class="title" style="margin:0">Select a series</p>
          <p class="sub" style="margin-top:8px">Pick a series on the left to edit its metadata.</p>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="row">
        <div>© <span id="y"></span> Toji Studios</div>
        <div>Series</div>
      </div>
    </footer>
  </main>

  <script type="module">
    import {
      loadStateAutoSync, saveState, el, setYearFooter, ensureBaseStyles,
      ensureSeriesMeta,
      getAdminToken,
      syncSeriesFromBackend,
      apiUpsertSeries,
      apiDeleteSeries,
      slugifySeries
    } from "./admin.js";

    ensureBaseStyles();
    setYearFooter();

    const state = await loadStateAutoSync();
    ensureSeriesMeta(state);
    saveState(state);

    const listEl = document.getElementById("list");
    const editor = document.getElementById("editor");
    const count = document.getElementById("count");
    const status = document.getElementById("status");
    const newName = document.getElementById("newName");
    const showHiddenToggle = document.getElementById("showHidden");
    const selectAllBtn = document.getElementById("selectAllBtn");
    const selectVisibleBtn = document.getElementById("selectVisibleBtn");
    const clearSelectionBtn = document.getElementById("clearSelectionBtn");
    const deleteSelectedBtn = document.getElementById("deleteSelectedBtn");
    const selectionCount = document.getElementById("selectionCount");
    const SHOW_HIDDEN_KEY = "toji_admin_series_show_hidden_v1";

    let activeSlug = null;
    let showHidden = localStorage.getItem(SHOW_HIDDEN_KEY) === "1";
    const selectedSlugs = new Set();
    if (showHiddenToggle) showHiddenToggle.checked = showHidden;

    const setStatus = (m, ms=900) => {
      status.textContent = m || "";
      if (m && ms) setTimeout(() => { if (status.textContent === m) status.textContent = ""; }, ms);
    };

    function seriesArray(){
      return Object.values(state.seriesMeta || {})
        .sort((a,b) => (Number(a.sortOrder||0) - Number(b.sortOrder||0)) || String(a.name||"").localeCompare(String(b.name||"")));
    }

    function renderList(){
      const allRows = seriesArray();
      const rows = showHidden ? allRows : allRows.filter(s => !!s.isPublic);
      const existingSlugs = new Set(allRows.map(s => s.slug));
      for (const slug of Array.from(selectedSlugs)) {
        if (!existingSlugs.has(slug)) selectedSlugs.delete(slug);
      }
      count.textContent = showHidden
        ? `${rows.length} series`
        : `${rows.length} visible (${allRows.length} total)`;
      if (selectionCount) selectionCount.textContent = `${selectedSlugs.size} selected`;
      if (deleteSelectedBtn) deleteSelectedBtn.disabled = selectedSlugs.size === 0;
      listEl.innerHTML = "";

      if (!rows.length){
        listEl.appendChild(el("div", { class:"sub" }, showHidden
          ? "No series yet. Create one above."
          : "No public series yet. Enable \"Show hidden series\" to manage hidden ones."));
        return;
      }

      for (const s of rows){
        const isActive = s.slug === activeSlug;
        const chk = el("input", { type: "checkbox", "aria-label": `Select series ${s.name || s.slug}` });
        chk.style.margin = "0";
        chk.style.width = "16px";
        chk.style.height = "16px";
        chk.style.cursor = "pointer";
        chk.checked = selectedSlugs.has(s.slug);
        chk.addEventListener("change", (e) => {
          if (e.target.checked) selectedSlugs.add(s.slug);
          else selectedSlugs.delete(s.slug);
          renderList();
        });
        chk.addEventListener("click", (e) => e.stopPropagation());

        const btn = el("button", {
          class:"btn",
          type:"button",
          style: `
            justify-content:flex-start; text-align:left; padding:12px 36px 12px 12px; border-radius:14px; width:100%; min-width:0;
            ${isActive ? "border-color: var(--accent-border); background: var(--accent-soft);" : ""}
          `
        },
          el("div", { style:"display:flex; gap:12px; align-items:center" },
            s.coverThumb ? el("img", { src:s.coverThumb, style:"width:48px;height:48px;border-radius:10px;object-fit:cover;border:1px solid var(--line)" }) : null,
            el("div", { style:"display:grid; gap:4px; min-width:0" },
              el("div", { style:"font-weight:650; overflow:hidden; text-overflow:ellipsis; white-space:nowrap" }, s.name || s.slug),
              el("div", { class:"sub" }, `${s.isPublic ? "Public" : "Hidden"} • Order ${Number(s.sortOrder||0)}`)
            )
          )
        );

        btn.addEventListener("click", () => {
          activeSlug = s.slug;
          renderList();
          renderEditor(s.slug);
        });

        const chkWrap = el("label", {
          style: "position:absolute; top:10px; right:10px; z-index:2; display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:8px; background: color-mix(in srgb, var(--panel) 90%, transparent); border:1px solid var(--line);"
        }, chk);
        chkWrap.addEventListener("click", (e) => e.stopPropagation());
        listEl.appendChild(el("div", { style:"position:relative" }, btn, chkWrap));
      }
    }

    showHiddenToggle?.addEventListener("change", (e) => {
      showHidden = !!e.target.checked;
      localStorage.setItem(SHOW_HIDDEN_KEY, showHidden ? "1" : "0");
      renderList();
    });

    selectAllBtn?.addEventListener("click", () => {
      seriesArray().forEach(s => selectedSlugs.add(s.slug));
      renderList();
    });

    selectVisibleBtn?.addEventListener("click", () => {
      const rows = showHidden ? seriesArray() : seriesArray().filter(s => !!s.isPublic);
      rows.forEach(s => selectedSlugs.add(s.slug));
      renderList();
    });

    clearSelectionBtn?.addEventListener("click", () => {
      selectedSlugs.clear();
      renderList();
    });

    deleteSelectedBtn?.addEventListener("click", async () => {
      const slugs = Array.from(selectedSlugs);
      if (!slugs.length) return;
      if (!confirm(`Delete ${slugs.length} selected series? (Does NOT change artworks)`)) return;

      for (const slug of slugs) delete state.seriesMeta[slug];
      if (activeSlug && slugs.includes(activeSlug)) activeSlug = null;
      slugs.forEach(slug => selectedSlugs.delete(slug));
      saveState(state);
      renderList();

      if (!activeSlug) {
        editor.innerHTML = "";
        editor.appendChild(el("div", { class:"sub" }, "Deleted selected series locally."));
      }

      if (!getAdminToken()) {
        setStatus("Deleted locally (no token).", 1400);
        return;
      }

      const results = await Promise.allSettled(slugs.map(slug => apiDeleteSeries(slug)));
      const failed = results.filter(r => r.status === "rejected").length;
      if (!failed) setStatus(`Deleted ${slugs.length} series.`, 1400);
      else setStatus(`Deleted locally. Backend failed for ${failed}/${slugs.length}.`, 2600);
    });

    function artworkOptions(){
      // Published + drafts are both valid for cover selection
      return (state.artworks || [])
        .slice()
        .sort((a,b) => String(b.updatedAt||"").localeCompare(String(a.updatedAt||"")))
        .map(a => ({
          id: a.id,
          label: `${a.title || "Untitled"} (${a.id})`,
          thumb: a.thumb || ""
        }));
    }

    function renderEditor(slug){
      const s = state.seriesMeta[slug];
      if (!s){
        editor.innerHTML = "";
        editor.appendChild(el("div", { class:"sub" }, "Series not found."));
        return;
      }

      editor.innerHTML = "";
      editor.appendChild(
        el("div", { style:"display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap" },
          el("p", { class:"title", style:"margin:0" }, `Edit: ${s.name}`),
          el("span", { class:"sub" }, `slug: ${s.slug}`)
        )
      );

      const saveMsg = el("span", { class:"sub", "aria-live":"polite" }, "");

      const nameField = inputField("Name", s.name || "", (v)=>{ s.name = v; queueSave(); });
      const descField = textareaField("Description", s.description || "", (v)=>{ s.description = v; queueSave(); });
      const orderField = inputField("Sort order (lower = earlier)", String(s.sortOrder ?? 0), (v)=>{ s.sortOrder = Number(v || 0); queueSave(); }, "number");
      const pubField = checkboxField("Public", !!s.isPublic, (v)=>{ s.isPublic = v; queueSave(true); });

            const covers = artworkOptions();
      const coverSelect = thumbSelectField(
        "Cover artwork",
        covers,
        s.coverArtworkId || "",
        (v)=>{ s.coverArtworkId = v; queueSave(true); }
      );

      const coverPreview = el("div", { class:"sub", style:"margin-top:10px" }, "");
      const refreshCoverPreview = () => {
        coverPreview.innerHTML = "";
        const opt = covers.find(x => x.id === (s.coverArtworkId || ""));
        if (!opt) return coverPreview.appendChild(el("span", {}, "No cover selected."));
        if (opt.thumb) coverPreview.appendChild(el("img", { src: opt.thumb, style:"width:120px;height:120px;border-radius:16px;object-fit:cover;border:1px solid var(--line);display:block" }));
      };
      refreshCoverPreview();

      editor.appendChild(el("hr", { class:"sep" }));
      editor.appendChild(nameField);
      editor.appendChild(descField);
      editor.appendChild(orderField);
      editor.appendChild(pubField);
      editor.appendChild(coverSelect);
      editor.appendChild(coverPreview);

      editor.appendChild(el("hr", { class:"sep" }));

      const saveBtn = el("button", { class:"btn primary", type:"button" }, "Save now");
      const delBtn  = el("button", { class:"btn", type:"button" }, "Delete series");

      editor.appendChild(el("div", { style:"display:flex; gap:10px; flex-wrap:wrap; align-items:center" },
        saveBtn,
        delBtn,
        el("span", { style:"margin-left:auto" }, saveMsg)
      ));

      // Save logic: local immediately, backend debounced
      let t = null;

      function localSave(){
        state.seriesMeta[slug] = { ...s };
        saveState(state);
        renderList();
      }

      async function backendSave(){
        // If token missing, keep local-only
        if (!getAdminToken()){
          saveMsg.textContent = "Saved locally (no token).";
          setTimeout(()=> saveMsg.textContent="", 900);
          return;
        }

        // Use slug as stable key; allow rename without changing slug
        const payload = {
          name: s.name,
          description: s.description,
          sortOrder: Number(s.sortOrder || 0),
          isPublic: !!s.isPublic,
          coverArtworkId: s.coverArtworkId || ""
        };

        saveMsg.textContent = "Saving…";
        try {
          const out = await apiUpsertSeries(slug, payload);
          // Merge backend response back in
          state.seriesMeta[slug] = {
            ...state.seriesMeta[slug],
            ...out,
            isPublic: !!out.isPublic
          };
          saveState(state);
          saveMsg.textContent = "Saved.";
          setTimeout(()=> saveMsg.textContent="", 900);
          refreshCoverPreview();
          renderList();
        } catch (e) {
          saveMsg.textContent = `Backend save failed (local ok): ${e?.message || e}`;
        }
      }

      function queueSave(immediateCover=false){
        localSave();
        refreshCoverPreview();

        clearTimeout(t);
        t = setTimeout(()=> backendSave(), immediateCover ? 0 : 600);
      }

      saveBtn.addEventListener("click", () => backendSave());

      delBtn.addEventListener("click", async () => {
        if (!confirm(`Delete series "${s.name}"? (Does NOT change artworks)`)) return;

        // local
        delete state.seriesMeta[slug];
        saveState(state);
        activeSlug = null;
        renderList();
        editor.innerHTML = "";
        editor.appendChild(el("div", { class:"sub" }, "Deleted locally."));

        // backend
        if (getAdminToken()){
          try { await apiDeleteSeries(slug); }
          catch (e) { setStatus(`Backend delete failed: ${e?.message || e}`, 2500); }
        } else {
          setStatus("Deleted locally (no token).", 1400);
        }
      });
    }

    // Create series
    document.getElementById("createBtn").addEventListener("click", async () => {
      const name = newName.value.trim();
      if (!name) return setStatus("Enter a series name.", 1400);

      const slug = slugifySeries(name);
      if (!slug) return setStatus("Name produced an invalid slug.", 1400);

      if (!state.seriesMeta[slug]) {
        state.seriesMeta[slug] = {
          slug,
          name,
          description: "",
          sortOrder: seriesArray().length * 10,
          isPublic: true,
          coverArtworkId: ""
        };
        saveState(state);
      }

      activeSlug = slug;
      newName.value = "";
      renderList();
      renderEditor(slug);

      // Attempt backend create
      if (getAdminToken()){
        try {
          await apiUpsertSeries(slug, state.seriesMeta[slug]);
          setStatus("Created (and saved to backend).");
        } catch(e) {
          setStatus(`Created locally; backend failed: ${e?.message || e}`, 2500);
        }
      } else {
        setStatus("Created locally (no token).", 1400);
      }
    });

    // -----------------------
    // Field helpers
    // -----------------------
    function inputField(label, value, onChange, type = "text"){
      const input = el("input", { type, value: value ?? "" });
      input.addEventListener("input", (e)=> onChange(e.target.value));
      return el("div", { class:"field", style:"margin-top:12px" },
        el("div", { class:"sub" }, label),
        input
      );
    }

    function textareaField(label, value, onChange){
      const t = el("textarea", {}, value ?? "");
      t.addEventListener("input", (e)=> onChange(e.target.value));
      return el("div", { class:"field", style:"margin-top:12px" },
        el("div", { class:"sub" }, label),
        t
      );
    }

    function checkboxField(label, checked, onChange){
      const input = el("input", { type:"checkbox", checked: checked ? "" : null });
      input.addEventListener("change", (e)=> onChange(e.target.checked));
      return el("div", { style:"display:flex; align-items:center; gap:10px; margin-top:12px" },
        input,
        el("label", { style:"cursor:pointer; margin:0" }, label)
      );
    }

    function selectField(label, options, current, onChange){
      const s = el("select", {},
        ...options.map(o => el("option", { value:o.value, selected: o.value===current ? "" : null }, o.label))
      );
      s.addEventListener("change", (e)=> onChange(e.target.value));
      return el("div", { class:"field", style:"margin-top:12px" },
        el("div", { class:"sub" }, label),
        s
      );
    }

    function thumbSelectField(label, options, current, onChange){
      let selectedId = current || "";
      const opts = [{ id:"", label:"None", thumb:"" }, ...(options || [])];

      const trigger = el("button", {
        class:"btn",
        type:"button",
        "aria-label":"Choose cover artwork",
        style:"width:100%; justify-content:flex-start; border-radius:12px; padding:8px 10px"
      });

      const menu = el("div", {
        style:`
          display:none;
          position:absolute;
          top:calc(100% + 8px);
          left:0;
          right:0;
          max-height:260px;
          overflow:auto;
          border:1px solid var(--line);
          border-radius:12px;
          background:var(--panel);
          padding:8px;
          z-index:20;
          box-shadow: var(--shadow);
        `
      });

      const setTrigger = () => {
        trigger.innerHTML = "";
        const active = opts.find(o => o.id === selectedId) || opts[0];
        if (!active.id) {
          trigger.appendChild(el("span", { class:"sub" }, "None"));
          return;
        }

        const thumb = active.thumb
          ? el("img", { src: active.thumb, alt: active.label || "Cover", style:"width:40px;height:40px;object-fit:cover;border-radius:8px;border:1px solid var(--line)" })
          : el("div", { class:"sub", style:"width:40px;height:40px;display:grid;place-items:center;border-radius:8px;border:1px solid var(--line)" }, "N/A");

        trigger.appendChild(el("div", { style:"display:flex;align-items:center;gap:10px" }, thumb, el("span", { class:"sub" }, "Selected")));
      };

      const closeMenu = () => { menu.style.display = "none"; };
      const openMenu = () => { menu.style.display = "block"; };

      trigger.addEventListener("click", () => {
        if (menu.style.display === "block") closeMenu();
        else openMenu();
      });

      for (const o of opts){
        const btn = el("button", {
          type:"button",
          class:"btn",
          "aria-label": o.label || "Cover option",
          style:`
            width:100%;
            justify-content:flex-start;
            border-radius:10px;
            padding:8px;
            margin-bottom:6px;
            ${o.id === selectedId ? "border-color: var(--accent-border); background: var(--accent-soft);" : ""}
          `
        });

        if (!o.id){
          btn.appendChild(el("span", { class:"sub" }, "None"));
        } else {
          btn.appendChild(
            o.thumb
              ? el("img", { src:o.thumb, alt:o.label || "Cover option", style:"width:48px;height:48px;object-fit:cover;border-radius:8px;border:1px solid var(--line)" })
              : el("div", { class:"sub", style:"width:48px;height:48px;display:grid;place-items:center;border-radius:8px;border:1px solid var(--line)" }, "N/A")
          );
        }

        btn.addEventListener("click", () => {
          selectedId = o.id;
          onChange(selectedId);
          setTrigger();
          closeMenu();
        });

        menu.appendChild(btn);
      }

      const root = el("div", { class:"field", style:"margin-top:12px; position:relative" },
        el("div", { class:"sub" }, label),
        trigger,
        menu
      );

      root.addEventListener("focusout", () => {
        setTimeout(() => {
          if (!root.contains(document.activeElement)) closeMenu();
        }, 0);
      });

      setTrigger();
      return root;
    }
 
    renderList();
  </script>
</body>
</html>
