<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Studio - Home Page Manager</title>
  <link rel="stylesheet" href="../assets/css/site.css" />
  <link rel="stylesheet" href="css/HomePageManager.css" />
</head>
<body>
  <header id="siteHeader"></header>

  <main class="container">
    <section class="hero" style="padding-bottom:10px">
      <h1>Home Page Manager</h1>
      <p>Control visibility for homepage sections.</p>
    </section>

    <div class="admin-layout">
      <aside class="sidebar" aria-label="Studio navigation">
        <a href="index.html">Image Manager</a>
        <a href="upload.html">Upload</a>
        <a href="series.html">Series Manager</a>
        <a href="linkmanager.html">Link Manager</a>
        <a class="active" href="HomePageManager.html">Home Page Manager</a>
        <a href="SocialMediaManager.html">Social Media Manager</a>
        <a href="OtherSettings.html">Other Settings</a>
        <a href="SecurityManager.html">Security Manager</a>
      </aside>

      <section>
        <article class="card">
          <div class="meta">
            <p class="title" style="margin:0">Homepage section visibility</p>
            <p class="sub" style="margin-top:8px">Changes are saved locally and applied on the public homepage.</p>

            <label class="home-toggle">
              <span class="switch">
                <input id="homeHeroToggle" type="checkbox" />
                <span class="slider" aria-hidden="true"></span>
              </span>
              <span class="toggle-status-badge" data-toggle-state>Disabled</span>
              <span class="sub">Home Intro</span>
            </label>
            <label class="home-toggle">
              <span class="switch">
                <input id="homeLatestToggle" type="checkbox" />
                <span class="slider" aria-hidden="true"></span>
              </span>
              <span class="toggle-status-badge" data-toggle-state>Disabled</span>
              <span class="sub">Latest section</span>
            </label>
            <label class="home-toggle">
              <span class="switch">
                <input id="homeFeaturedToggle" type="checkbox" />
                <span class="slider" aria-hidden="true"></span>
              </span>
              <span class="toggle-status-badge" data-toggle-state>Disabled</span>
              <span class="sub">Featured section</span>
            </label>
            <label class="home-toggle">
              <span class="switch">
                <input id="homeSeriesToggle" type="checkbox" />
                <span class="slider" aria-hidden="true"></span>
              </span>
              <span class="toggle-status-badge" data-toggle-state>Disabled</span>
              <span class="sub">Series section</span>
            </label>
            <label class="home-toggle">
              <span class="switch">
                <input id="homeFeaturedSlideshowToggle" type="checkbox" />
                <span class="slider" aria-hidden="true"></span>
              </span>
              <span class="toggle-status-badge" data-toggle-state>Disabled</span>
              <span class="sub">Featured Slideshow</span>
            </label>
          </div>
        </article>

        <footer id="siteFooter"></footer>
      </section>
    </div>
  </main>

  <script type="module" src="./js/home-page-manager.js"></script>
</body>
</html>
