<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Artwork &mdash; Toji Studios</title>
  <link rel="stylesheet" href="assets/css/site.css" />
</head>
<body>
  <header id="siteHeader"></header>

  <main class="container page-with-sticky-hero">
    <section class="hero hero--sticky" style="padding-bottom:10px">
      <h1 id="t">Artwork</h1>
      <p id="sub">Loading&hellip;</p>
    </section>

    <section class="grid" aria-label="Artwork layout">
      <div class="card" style="grid-column: span 8">
        <div class="thumb artwork-media" style="aspect-ratio: 16/10">
          <img id="img" alt="" />
        </div>
      </div>

      <div class="card" style="grid-column: span 4">
        <div class="meta">
          <p class="title" id="title">&mdash;</p>
          <p class="sub" id="metaLine">&mdash;</p>

          <hr class="sep" />

          <p class="sub" id="desc" style="font-size:15px; line-height:1.65; white-space:pre-wrap"></p>

          <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px">
            <a class="btn primary" id="inquireBtn" href="contact.html">Inquire</a>
            <button class="btn" id="copyLink" type="button">Copy link</button>
            <a class="btn" href="gallery.html">Back to gallery</a>
          </div>

          <div id="tagsWrap" style="margin-top:14px"></div>
        </div>
      </div>

      <div class="card" style="grid-column: span 12">
        <div class="meta">
          <div style="display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap">
            <p class="title" style="margin:0">More like this</p>
            <a class="btn" id="moreLink" href="gallery.html">View all</a>
          </div>
          <p class="sub" style="margin-top:8px">From the same series (if available), otherwise from recent work.</p>

          <div class="grid" id="moreGrid" style="margin-top:12px"></div>
        </div>
      </div>
    </section>
  </main>

  <footer id="siteFooter"></footer>

  <script type="module" src="./assets/js/artwork-page.js"></script>
</body>
</html>
