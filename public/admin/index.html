<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="js/admin-session-guard.js"></script>
  <title>Studio &mdash; Dashboard</title>
  <link rel="stylesheet" href="../assets/css/site.css" />
  <link rel="stylesheet" href="css/index.css" />
  <style>
    .dashboard-filter-toggle{
      display:inline-grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:0;
      border:1px solid var(--line);
      border-radius:9px;
      overflow:hidden;
      background: color-mix(in srgb, var(--panel) 92%, var(--muted) 8%);
      width:min(100%, 410px);
      margin-right:6px;
    }
    .dashboard-filter-toggle [data-tab]{
      border:0;
      border-right:1px solid var(--line);
      border-radius:0;
      padding:5px 6px;
      justify-content:center;
      background:transparent;
      box-shadow:none;
      cursor:pointer;
      color:var(--muted);
      font-size:14px;
    }
    .dashboard-filter-toggle [data-tab]:last-child{
      border-right:0;
    }
    .dashboard-filter-toggle [data-tab]:hover{
      transform:none;
      box-shadow:none;
      background: color-mix(in srgb, var(--panel) 82%, var(--accent-soft) 18%);
    }
    .dashboard-filter-toggle [data-tab].active{
      background: var(--accent-soft);
      color: var(--text);
      border-color: var(--accent-border);
    }
  </style>
</head>
<body>
  <header id="siteHeader"></header>

  <main class="container">
    <section class="hero" style="padding-bottom:10px">
      <h1>Studio Dashboard</h1>
      <p>Manage drafts, published work, and hidden pieces.</p>
    </section>

	    <div class="admin-layout">
	      <aside class="sidebar" aria-label="Studio navigation"></aside>

      <section>
        <div class="dashboard-controls">
          <div class="kpi">
          <div class="card"><div class="meta"><div class="sub">Published</div><b id="kPub">&mdash;</b></div></div>
          <div class="card"><div class="meta"><div class="sub">Drafts</div><b id="kDraft">&mdash;</b></div></div>
          <div class="card"><div class="meta"><div class="sub">Hidden</div><b id="kHidden">&mdash;</b></div></div>
        </div>

          <div class="filters" style="margin-top:18px">
          <span class="sub" style="white-space:nowrap;">Quick Filters:</span>
          <div class="dashboard-filter-toggle" role="group" aria-label="Quick filters">
            <button class="btn active" type="button" data-tab="all">All</button>
            <button class="btn" type="button" data-tab="published">Published</button>
            <button class="btn" type="button" data-tab="draft">Draft</button>
            <button class="btn" type="button" data-tab="hidden">Hidden</button>
            <button class="btn" type="button" data-tab="featured">Featured</button>
          </div>

          <div class="segmented" role="group" aria-label="Dashboard view mode">
            <button type="button" data-view-mode="rows" class="active">Rows</button>
            <button type="button" data-view-mode="thumbs">Thumbnails</button>
          </div>
          <button class="btn" id="thumbSelectAllToggle" type="button" style="display:none">Select all thumbs</button>

          <div class="search">
            <span>Search</span>
            <input id="q" placeholder="title, tag, series&hellip;" />
          </div>


          <button class="btn" id="toggleOrder" type="button">Manual order: Off</button>

          <!-- Bulk actions -->
          <div id="bulkBar" style="display:none; align-items:center; gap:10px; flex-wrap:wrap">
            <span class="sub"><b id="bulkCount">0</b> selected</span>

            <select id="bulkAction" aria-label="Bulk action" style="width:auto; min-width:220px">
              <option value="">Bulk action...</option>
              <option value="publish">Publish</option>
              <option value="draft">Set Draft</option>
              <option value="hidden">Hide</option>
              <option value="feature">Feature</option>
              <option value="unfeature">Unfeature</option>
              <option value="tags">Edit tags...</option>
              <option value="series">Assign series...</option>
              <option value="delete">Delete</option>
              <option value="clear">Clear selection</option>
            </select>

            <button class="btn" id="bulkApply" type="button">Apply</button>


            <!-- Bulk tag editor (shown only for tag actions) -->
            <div id="bulkTagBox" style="display:none; align-items:center; gap:10px; flex-wrap:wrap">
              <select id="bulkTagMode" aria-label="Tag operation" style="width:auto; min-width:170px">
                <option value="add">Add tag</option>
                <option value="remove">Remove tag</option>
              </select>

              <input id="bulkTagInput" placeholder="tags... (comma-separated)" style="width:auto; min-width:240px" />

              <select id="bulkTagPick" aria-label="Pick existing tag" style="width:auto; min-width:220px">
                <option value="">Pick existing tag...</option>
              </select>

              <button class="btn" id="bulkTagApply" type="button">Apply tag</button>
            </div>

            <!-- Bulk series assignment (shown only for series action) -->
            <div id="bulkSeriesBox" style="display:none; align-items:center; gap:10px; flex-wrap:wrap">
              <select id="bulkSeriesPick" aria-label="Pick series" style="width:auto; min-width:220px">
                <option value="">Pick series...</option>
              </select>

              <input id="bulkSeriesInput" placeholder="or type a new series..." style="width:auto; min-width:240px" />

              <button class="btn" id="bulkSeriesApply" type="button">Apply series</button>

              <button class="btn" id="bulkSeriesClear" type="button">Clear series</button>
            </div>



          </div>





          </div>
        </div>

        <div class="table-scroll-shell" id="rowTableShell">
        <table class="table" id="rowTable" aria-label="Artwork table">
          <thead>
            <tr>
              <th style="width:52px">
<button class="admin-row-select" id="selectAll" type="button" aria-label="Select all visible" aria-pressed="false">&#9675;</button>
              </th>
              <th id="sortHeaderArtwork" aria-sort="none">
                <button class="admin-sort-header" type="button" data-sort-header="title">Artwork<span class="admin-sort-icon" aria-hidden="true"></span></button>
              </th>
              <th id="sortHeaderStatus" aria-sort="none">
                <button class="admin-sort-header" type="button" data-sort-header="status">Status<span class="admin-sort-icon" aria-hidden="true"></span></button>
              </th>
              <th id="sortHeaderTags" aria-sort="none">
                <button class="admin-sort-header" type="button" data-sort-header="tags">Tags<span class="admin-sort-icon" aria-hidden="true"></span></button>
              </th>
              <th id="sortHeaderSeries" aria-sort="none">
                <button class="admin-sort-header" type="button" data-sort-header="series">Series<span class="admin-sort-icon" aria-hidden="true"></span></button>
              </th>
              <th id="sortHeaderYear" aria-sort="none">
                <button class="admin-sort-header" type="button" data-sort-header="year">Year<span class="admin-sort-icon" aria-hidden="true"></span></button>
              </th>
              <th><span class="admin-header-label">Actions</span></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        </div>
        <div class="table-scroll-shell" id="thumbGridShell" style="display:none">
          <div id="thumbGrid" class="admin-thumb-grid" aria-label="Artwork thumbnails"></div>
        </div>

        <footer id="siteFooter"></footer>
      </section>
    </div>
</main>




  <script type="module" src="./js/index.js"></script>
</body>
</html>
