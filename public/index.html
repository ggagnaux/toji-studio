<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Toji Studios</title>
  <link rel="stylesheet" href="assets/css/site.css" />
  <link rel="stylesheet" href="assets/css/index.css" />
</head>

<body class="home-animated">
  <div id="splashScreen" class="splash-screen hidden" aria-label="Splash screen">
    <div id="splashP5" class="splash-p5" aria-hidden="true"></div>
    <div id="splashCountdown" class="splash-countdown hidden" aria-live="polite"></div>
    <button id="splashLogo" class="splash-logo" type="button" aria-label="Enter site">
      <span class="brand-logo-combo splash-logo-combo" aria-hidden="true">
        <span class="brand-logo-icon-stack">
          <img class="brand-logo-icon-image splash-logo-combo-image" src="assets/img/TojiStudios-Logo.png" alt="" />
        </span>
        <span class="brand-logo-wordmark-stack">
          <img class="brand-logo-wordmark-image brand-logo-wordmark-image--for-dark splash-logo-combo-image" src="assets/img/TojiStudios-Light-TextOnly.png" alt="" />
          <img class="brand-logo-wordmark-image brand-logo-wordmark-image--for-light splash-logo-combo-image" src="assets/img/TojiStudios-Dark-TextOnly.png" alt="" />
        </span>
      </span>
      <span class="sr-only">Toji Studios</span>
    </button>
  </div>
  <header id="siteHeader"></header>

  <main class="container page-with-sticky-hero">
    <section class="hero hero--sticky" id="homeHeroSection">
      <h1>Toji Studios</h1>
      <p>Abstract, cosmic-leaning digital artwork—geometry, atmosphere, and controlled chaos.</p>
      <!-- <div class="cta">
        <a class="btn primary" href="gallery.html">Explore the Gallery</a>
        <a class="btn" href="contact.html">Inquire</a>
      </div> -->
    </section>

    <section id="featuredSlideshowSection" style="display:none">
      <div id="featuredSlideshow" class="home-slideshow" aria-label="Featured slideshow"></div>
    </section>

    <!-- Featured strip -->
    <section id="featuredSection" class="gallery-section gallery-section-featured" style="display:none">
      <div class="section-title">
        <h2>Featured</h2>
        <span id="featuredHint">—</span>
      </div>

      <div id="featuredStrip" aria-label="Featured artworks"></div>
    </section>

    <section id="homeSeriesSection" class="gallery-section gallery-section-series" style="display:none">
      <div class="section-title" style="margin-top:28px">
        <h2>Series</h2>
        <span id="homeSeriesHint">-</span>
      </div>
      <section class="grid" id="homeSeriesGrid" aria-label="Series collection"></section>
    </section>

    <!-- Latest works -->
    <section id="latestSection" style="display:none">
    <div class="section-title" style="margin-top:28px">
      <h2>Latest</h2>
      <span id="latestHint">—</span>
    </div>

    <section class="grid" id="latestGrid" aria-label="Latest artworks"></section>
    </section>


    <!-- <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:18px">
      <a class="btn primary" href="gallery.html">View all works</a>
      <a class="btn" href="contact.html">Licensing / commissions</a>
    </div> -->
  </main>

  <footer id="siteFooter"></footer>

  <script type="module" src="./assets/js/index-page.js"></script>
</body>

</html>
