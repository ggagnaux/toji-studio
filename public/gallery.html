<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gallery - Toji Studios</title>
  <link rel="stylesheet" href="assets/css/site.css" />
  <style>
    .gallery-section{
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-top: 18px;
    }
    .gallery-section-featured{ background: color-mix(in srgb, var(--panel) 86%, var(--accent) 14%); }
    .gallery-section-series{ background: color-mix(in srgb, var(--panel) 88%, var(--alternateaccent) 12%); }
    .gallery-section-all{ background: color-mix(in srgb, var(--panel) 90%, var(--muted) 10%); }
    .gallery-jump-pills{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin:0;
    }
    .gallery-jump-pill{
      cursor:pointer;
      user-select:none;
    }
    .gallery-jump-pill--top{
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity .18s ease, transform .18s ease;
    }
    .gallery-jump-pill--top.is-visible{
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .gallery-jump-wrap{
      position: sticky;
      top: var(--gallery-jump-top, 78px);
      z-index: 22;
      margin-top: 6px;
      margin-bottom: 8px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: color-mix(in srgb, var(--panel) 90%, transparent);
      backdrop-filter: blur(6px);
    }
    .back-to-top{
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 30;
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.22);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }
    .back-to-top.is-visible{
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #featuredGrid,
    #seriesGrid,
    #galleryGrid{
      gap: 12px;
      align-items: start;
      justify-content: start;
    }
    #featuredGrid{
      display: block;
      column-gap: 12px;
      columns: 4 220px;
    }
    #seriesGrid{
      display: block;
      column-gap: 12px;
      columns: 4 220px;
    }
    #galleryGrid{
      display: block;
      column-gap: 12px;
      columns: 8 110px;
    }
    #featuredGrid .card{
      display: inline-block;
      width: 100%;
      max-width: none;
      margin: 0 0 12px 0;
      break-inside: avoid;
      vertical-align: top;
      box-shadow: none;
    }
    #seriesGrid .card{
      display: inline-block;
      width: 100%;
      max-width: none;
      margin: 0 0 12px 0;
      break-inside: avoid;
      vertical-align: top;
      box-shadow: none;
    }
    #featuredGrid .thumb{
      aspect-ratio: auto;
      background: transparent;
    }
    #seriesGrid .thumb{
      aspect-ratio: auto;
      background: transparent;
    }
    #seriesGrid .series-card{
      overflow: hidden;
    }
    #seriesGrid .series-masonry{
      columns: 3 70px;
      column-gap: 6px;
      padding: 10px;
    }
    #seriesGrid .series-masonry img{
      width: 100%;
      height: auto;
      display: block;
      margin: 0 0 6px 0;
      border-radius: 8px;
      break-inside: avoid;
      background: color-mix(in srgb, var(--surface) 80%, transparent);
      border: 1px solid var(--line);
    }
    @media (max-width: 720px){
      #seriesGrid .series-masonry{
        columns: 2 90px;
      }
    }
    #featuredGrid .thumb img,
    #seriesGrid .thumb img{
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center;
      background: transparent;
      display: block;
    }
    #galleryGrid .card{
      display: inline-block;
      width: 100%;
      max-width: none;
      margin: 0 0 12px 0;
      break-inside: avoid;
      vertical-align: top;
      box-shadow: none;
    }
    #galleryGrid .thumb{
      aspect-ratio: auto;
      background: transparent;
      position: relative;
      overflow: hidden;
    }
    #galleryGrid .thumb img{
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center;
      background: transparent;
      display: block;
    }
    #galleryGrid .gallery-overlay{
      position: absolute;
      inset: auto 0 0 0;
      padding: 10px 12px;
      background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.72) 55%, rgba(0,0,0,.86) 100%);
      color: #fff;
      opacity: 0;
      transition: opacity .18s ease;
      pointer-events: none;
    }
    #galleryGrid .gallery-overlay .title{
      margin: 0 0 2px 0;
      font-weight: 600;
      line-height: 1.2;
    }
    #galleryGrid .gallery-overlay .sub{
      margin: 0;
      color: rgba(255,255,255,.9);
      font-size: 12px;
      line-height: 1.25;
    }
    #galleryGrid .card:hover .gallery-overlay,
    #galleryGrid .card:focus-visible .gallery-overlay,
    #galleryGrid .card:focus-within .gallery-overlay{
      opacity: 1;
    }
  </style>
</head>

<body class="home-animated">
  <header id="siteHeader"></header>

  <main class="container">
    <section class="hero" style="padding-bottom:10px">
      <h1>Gallery</h1>
      <p>Browse published work from Studio. Filter by tag, search, and open any piece to view larger.</p>
    </section>

    <section aria-label="Jump to gallery section" class="gallery-jump-wrap">
      <div class="gallery-jump-pills">
        <button class="chip gallery-jump-pill" type="button" data-scroll-target="featuredWrap">Featured</button>
        <button class="chip gallery-jump-pill" type="button" data-scroll-target="seriesWrap">Series</button>
        <button class="chip gallery-jump-pill" type="button" data-scroll-target="allWorksWrap">All works</button>
        <button id="jumpBackToTopBtn" class="chip gallery-jump-pill gallery-jump-pill--top" type="button" aria-label="Back to top">Top ↑</button>
      </div>
    </section>

    <!-- Featured section -->
    <section id="featuredWrap" class="gallery-section gallery-section-featured" style="display:none">
      <div class="section-title">
        <h2>Featured</h2>
        <span id="featuredCount">â€”</span>
      </div>

      <section class="grid" id="featuredGrid" aria-label="Featured artworks"></section>
    </section>

    <section id="seriesWrap" class="gallery-section gallery-section-series" style="display:none">
      <div class="section-title" style="margin-top:28px">
        <h2>Series</h2>
        <span id="seriesCount">-</span>
      </div>

      <section class="grid" id="seriesGrid" aria-label="Series collection"></section>
    </section>

    <section id="allWorksWrap" class="gallery-section gallery-section-all">
      <div class="section-title" style="margin-top:0">
        <h2>All works</h2>
        <span id="allCount">â€”</span>
      </div>

      <section class="filters" aria-label="Gallery filters">
        <div id="tagChips" style="display:flex; gap:10px; flex-wrap:wrap; align-items:center"></div>

        <div class="search" style="margin-left:auto">
          <span>Search</span>
          <input id="q" placeholder="title, tag, series" />
          <button id="qClear" class="icon-btn" type="button" aria-label="Clear search" style="display:none; width:28px; height:28px; padding:0;">x</button>
        </div>
      </section>

      <section class="grid" id="galleryGrid" aria-label="Gallery grid"></section>
    </section>
  </main>

  <footer id="siteFooter"></footer>
  <button id="backToTopBtn" class="btn back-to-top" type="button" aria-label="Back to top">Top ↑</button>

  <script type="module">
    import { renderPublicHeader } from "./assets/js/header.js";
    import { renderPublicFooter } from "./assets/js/footer.js";
    import { el, slugifySeries, sortGallery, createArtworkLightboxController } from "./assets/js/content-utils.js";

    renderPublicHeader({
      active: "gallery",
      small: "gallery",
      ctaText: "Inquire",
      ctaHref: "contact.html",
      //brandLogoSrc: "assets/img/TojiStudios_LogoAndName_ForWebsite.png"
      brandLogoSrc: "assets/img/logo.png"
    });
    renderPublicFooter({
      rightHtml: `<a href="index.html">Home</a> â€¢ <a href="gallery.html">Gallery</a> â€¢ <a href="series.html">Series</a> â€¢ <a href="contact.html">Contact</a> â€¢ <a href="admin/index.html">Studio</a>`
    });

    // ---- Gallery data source: Admin localStorage first, fallback to sample JSON ----
    const ADMIN_STORAGE_KEY = "toji_admin_state_v1";
    const FALLBACK_URL = "assets/data/admin.sample.json";

    async function loadGalleryState() {
      const saved = localStorage.getItem(ADMIN_STORAGE_KEY);
      if (saved) {
        try {
          return JSON.parse(saved);
        } catch {
          // fall through to fetch
        }
      }
      const res = await fetch(FALLBACK_URL, { cache: "no-store" });
      return res.json();
    }

    // ---- Helpers ----


    function uniqTags(items) {
      const set = new Set();
      items.forEach(a => (a.tags || []).forEach(t => set.add(String(t).toLowerCase())));
      return ["all", ...Array.from(set).sort()];
    }


    // ---- State ----
    const featuredWrap = document.getElementById("featuredWrap");
    const featuredGrid = document.getElementById("featuredGrid");
    const featuredCount = document.getElementById("featuredCount");
    const seriesWrap = document.getElementById("seriesWrap");
    const seriesGrid = document.getElementById("seriesGrid");
    const seriesCount = document.getElementById("seriesCount");

    const grid = document.getElementById("galleryGrid");
    const chipHost = document.getElementById("tagChips");
    const qInput = document.getElementById("q");
    const qClear = document.getElementById("qClear");
    const allWorksWrap = document.getElementById("allWorksWrap");
    const jumpWrap = document.querySelector(".gallery-jump-wrap");
    const sectionJumpButtons = Array.from(document.querySelectorAll("[data-scroll-target]"));
    const jumpBackToTopBtn = document.getElementById("jumpBackToTopBtn");
    const backToTopBtn = document.getElementById("backToTopBtn");

    const allCount = document.getElementById("allCount");

    const state = await loadGalleryState();
    const allItems = sortGallery((state.artworks || []).filter(a => a.status === "published"));
    const seriesMetaRows = Object.values(state.seriesMeta || {});
    const seriesMetaByName = new Map(
      seriesMetaRows
        .filter(m => m && m.name)
        .map(m => [String(m.name).trim().toLowerCase(), m])
    );
    const seriesMetaBySlug = new Map(
      seriesMetaRows
        .filter(m => m && m.slug)
        .map(m => [String(m.slug).trim().toLowerCase(), m])
    );
    let activeTag = "all";
    let q = "";

    function refreshSearchClear(){
      if (!qClear || !qInput) return;
      qClear.style.display = qInput.value.trim() ? "inline-flex" : "none";
    }

    function syncJumpPillOffset() {
      const header = document.getElementById("siteHeader");
      const headerHeight = Math.ceil(header?.getBoundingClientRect().height || 0);
      const width = window.innerWidth || document.documentElement.clientWidth || 0;
      const extraGap = width <= 560 ? 32 : width <= 920 ? 34 : 36;
      const minTop = width <= 560 ? 82 : width <= 920 ? 84 : 86;
      const top = Math.max(minTop, headerHeight + extraGap);
      document.documentElement.style.setProperty("--gallery-jump-top", `${top}px`);
    }
    syncJumpPillOffset();
    window.addEventListener("resize", syncJumpPillOffset);

    sectionJumpButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        const targetId = btn.getAttribute("data-scroll-target");
        const target = targetId ? document.getElementById(targetId) : null;
        if (!target) return;
        const header = document.getElementById("siteHeader");
        const headerHeight = Math.ceil(header?.getBoundingClientRect().height || 0);
        const jumpRowHeight = Math.ceil(jumpWrap?.getBoundingClientRect().height || 0);
        const sectionGap = 10;
        const top = window.scrollY + target.getBoundingClientRect().top - (headerHeight + jumpRowHeight + sectionGap);
        window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
      });
    });

    function syncBackToTopVisibility() {
      const show = window.scrollY > 8;
      backToTopBtn?.classList.toggle("is-visible", show);
      jumpBackToTopBtn?.classList.toggle("is-visible", show);
    }
    jumpBackToTopBtn?.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    backToTopBtn?.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    window.addEventListener("scroll", syncBackToTopVisibility, { passive: true });
    syncBackToTopVisibility();

    function rerenderFilteredSectionsPreserveAllWorksScroll() {
      const prevTop = allWorksWrap ? allWorksWrap.getBoundingClientRect().top : null;
      renderAll();
      renderFeatured();
      renderSeries();
      if (prevTop == null || !allWorksWrap) return;
      const nextTop = allWorksWrap.getBoundingClientRect().top;
      const delta = nextTop - prevTop;
      if (Math.abs(delta) > 1) window.scrollBy({ top: delta, left: 0, behavior: "auto" });
    }

    // ---- Render chips ----
    const tags = uniqTags(allItems);

    function renderChips() {
      chipHost.innerHTML = "";
      tags.forEach(t => {
        const chip = el("div", { class: "chip" + (t === activeTag ? " active" : ""), role: "button", tabindex: "0" }, t);
        chip.addEventListener("click", () => {
          activeTag = t;
          renderChips();
          renderAll();
        });
        chip.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            activeTag = t;
            renderChips();
            renderAll();
          }
        });
        chipHost.appendChild(chip);
      });
    }

    // ---- Filtering ----
    function matchesTopSections(a) {
      const text = `${a.title || ""} ${(a.tags || []).join(" ")} ${a.series || ""} ${a.year || ""}`.toLowerCase();
      const qOk = !q || text.includes(q);
      return qOk;
    }

    function matchesAllWorks(a) {
      const tagOk = activeTag === "all" || (a.tags || []).map(x => String(x).toLowerCase()).includes(activeTag);
      const text = `${a.title || ""} ${(a.tags || []).join(" ")} ${a.series || ""} ${a.year || ""}`.toLowerCase();
      const qOk = !q || text.includes(q);
      return tagOk && qOk;
    }

    // ---- Lightbox ----
    const lightbox = createArtworkLightboxController();
    document.body.appendChild(lightbox.host);
    const openLightbox = (list, idx) => lightbox.open(list, idx);

    // ---- Card renderer ----
    function renderCards(host, items) {
      host.innerHTML = "";

      if (!items.length) {
        host.appendChild(
          el("div", { class: "card", style: "grid-column: 1 / -1; max-width:none; width:100%" },
            el("div", { class: "meta" },
              el("p", { class: "title" }, "No matches"),
              el("p", { class: "sub" }, "Try a different tag or search term.")
            )
          )
        );
        return;
      }

      items.forEach((a, idx) => {
        const metaBits = [
          a.series ? a.series : null,
          a.year ? a.year : null,
          a.featured ? "Featured" : null
        ].filter(Boolean).join(" • ") || " ";
        const isAllWorks = host === grid;

        const card = el("a", {
          class: "card",
          href: `artwork.html?id=${encodeURIComponent(a.id)}`,
          style: "",
          onclick:(e)=>{ e.preventDefault(); openLightbox(items, idx); }
        },
          isAllWorks
            ? el("div", { class: "thumb" },
                el("img", { src: a.thumb || a.image, alt: a.alt || a.title || "Artwork", loading: "lazy" }),
                el("div", { class: "gallery-overlay" },
                  el("p", { class: "title" }, a.title || "Untitled"),
                  el("p", { class: "sub" }, metaBits)
                )
              )
            : [
                el("div", { class: "thumb" }, el("img", { src: a.thumb || a.image, alt: a.alt || a.title || "Artwork", loading: "lazy" })),
                el("div", { class: "meta" },
                  el("p", { class: "title" }, a.title || "Untitled"),
                  el("p", { class: "sub" }, metaBits)
                )
              ]
        );

        host.appendChild(card);
      });

    }

    // ---- Featured section ----
    function renderFeatured() {
      // Featured should follow the same filters/search so it feels consistent.
      const featured = sortGallery(allItems.filter(a => a.featured && matchesTopSections(a)));

      if (!featured.length) {
        featuredWrap.style.display = "none";
        return;
      }

      featuredWrap.style.display = "";
      featuredCount.textContent = `${featured.length} piece${featured.length === 1 ? "" : "s"}`;
      renderCards(featuredGrid, featured);
    }

    // ---- Series section ----
    function renderSeries() {
      const filtered = sortGallery(allItems.filter(matchesTopSections)).filter(a => a.series);
      const bySeries = new Map();

      for (const a of filtered) {
        const key = String(a.series || "").trim();
        if (!key) continue;
        if (!bySeries.has(key)) bySeries.set(key, []);
        bySeries.get(key).push(a);
      }

      const entries = Array.from(bySeries.entries())
        .map(([name, items]) => {
          const slug = slugifySeries(name);
          const meta = seriesMetaByName.get(name.toLowerCase()) || seriesMetaBySlug.get(slug) || null;
          const cover = (meta && meta.coverThumb) || items[0]?.thumb || items[0]?.image || "assets/img/placeholders/p1.jpg";
          const description = (meta && meta.description) || "";
          const sortOrderRaw = Number(meta?.sortOrder);
          const sortOrder = Number.isFinite(sortOrderRaw) ? sortOrderRaw : Number.MAX_SAFE_INTEGER;
          const isPublic = meta?.isPublic == null ? true : !!meta.isPublic;
          return { name, slug, cover, description, items, sortOrder, isPublic };
        })
        .filter((s) => s.isPublic)
        .sort((a, b) => {
          if (a.sortOrder !== b.sortOrder) return a.sortOrder - b.sortOrder;
          return a.name.localeCompare(b.name);
        });

      seriesGrid.innerHTML = "";
      if (!entries.length) {
        seriesWrap.style.display = "none";
        return;
      }

      seriesWrap.style.display = "";
      seriesCount.textContent = `${entries.length} series`;

      for (const s of entries) {
        const seriesItems = sortGallery(s.items);
        const previewItems = seriesItems.slice(0, 8);
        seriesGrid.appendChild(
          el("article", { class: "series-item" },
            el("a", {
              class: "card series-card",
              href: "#",
              onclick: (e) => {
                e.preventDefault();
                openLightbox(seriesItems, 0);
              }
            },
              el("div", { class: "series-masonry", "aria-hidden": "true" },
                ...previewItems.map((item) => el("img", {
                  src: item.thumb || item.image || s.cover,
                  alt: "",
                  loading: "lazy"
                }))
              ),
              el("div", { class: "meta" },
                el("p", { class: "title" }, s.name),
                el("p", { class: "sub" }, `${s.items.length} piece${s.items.length === 1 ? "" : "s"}`)
              )
            )
          )
        );
      }
    }

    // ---- All works section ----
    function renderAll() {
      const items = sortGallery(allItems.filter(matchesAllWorks));
      allCount.textContent = `${items.length} piece${items.length === 1 ? "" : "s"}`;

      grid.innerHTML = "";
      if (!items.length) {
        grid.appendChild(
          el("div", { class: "card", style: "grid-column: 1 / -1; max-width:none; width:100%" },
            el("div", { class: "meta" },
              el("p", { class: "title" }, "No matches"),
              el("p", { class: "sub" }, "Try a different tag or search term.")
            )
          )
        );
        return;
      }

      renderCards(grid, items);
    }

    qInput.addEventListener("input", (e) => {
      q = e.target.value.trim().toLowerCase();
      renderFeatured();
      renderSeries();
      renderAll();
      refreshSearchClear();
    });

    qClear?.addEventListener("click", () => {
      qInput.value = "";
      q = "";
      renderFeatured();
      renderSeries();
      renderAll();
      refreshSearchClear();
      qInput.focus();
    });


    renderChips();
    renderFeatured();
    renderSeries();
    renderAll();
    refreshSearchClear();
  </script>
</body>

</html>
