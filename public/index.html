<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Toji Studios</title>
  <link rel="stylesheet" href="assets/css/site.css" />
  <style>
    .gallery-section{
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-top: 18px;
    }
    .gallery-section-featured{ background: color-mix(in srgb, var(--panel) 86%, var(--accent) 14%); }
    .gallery-section-series{ background: color-mix(in srgb, var(--panel) 88%, var(--alternateaccent) 12%); }

    #latestGrid{
      gap: 12px;
    }
    #featuredStrip{
      display: block;
      column-gap: 12px;
      columns: 4 220px;
      align-items: start;
      justify-content: start;
    }
    #homeSeriesGrid{
      display: block;
      column-gap: 12px;
      columns: 4 220px;
      align-items: start;
      justify-content: start;
    }
    #featuredStrip .card,
    #homeSeriesGrid .card{
      display: inline-block;
      width: 100%;
      max-width: none;
      margin: 0 0 12px 0;
      break-inside: avoid;
      vertical-align: top;
      box-shadow: none;
    }
    #featuredStrip .thumb,
    #homeSeriesGrid .thumb{
      aspect-ratio: auto;
      background: transparent;
    }
    #featuredStrip .thumb img,
    #homeSeriesGrid .thumb img{
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center;
      background: transparent;
      display: block;
    }
    .home-series-item .sub{
      max-width: none;
      margin-top: 8px;
      line-height: 1.55;
    }
    #latestGrid .card{
      width: 100%;
      min-width: 0;
      max-width: none;
    }
    #featuredSlideshowSection{
      margin-top: 8px;
    }
    .home-slideshow{
      position: relative;
      width: 100%;
      min-height: 340px;
      height: clamp(240px, 38vh, 420px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: color-mix(in srgb, var(--panel) 86%, var(--bg));
      box-shadow: none;
    }
    .home-slideshow-carousel{
      width: 100%;
      height: 100%;
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent 0%, #000 6%, #000 94%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 6%, #000 94%, transparent 100%);
    }
    .home-slideshow-track{
      display: flex;
      width: max-content;
      height: 100%;
      gap: 14px;
      padding: 10px 0;
      animation: homeCarouselMove var(--carousel-duration, 56s) linear infinite;
      will-change: transform;
    }
    .home-slideshow-item{
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(66vw, 420px);
      min-width: 260px;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: color-mix(in srgb, var(--panel) 90%, transparent);
      padding: 10px;
    }
    .home-slideshow-item img{
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      background: var(--bg);
    }
    @keyframes homeCarouselMove{
      from{ transform: translateX(0); }
      to{ transform: translateX(calc(-50% - 7px)); }
    }
    @media (prefers-reduced-motion: reduce){
      .home-slideshow-track{ animation: none; }
    }
    .splash-active{
      overflow:hidden;
    }
    .splash-screen{
      position:fixed;
      inset:0;
      z-index:2000;
      display:grid;
      place-items:center;
      background: var(--bg);
      overflow:hidden;
      transition: opacity .35s ease, visibility .35s ease;
    }
    .splash-screen.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }
    .splash-logo{
      position:relative;
      z-index:2;
      border: 2px solid #333333;
      /* border-radius:20px; */
      /* background: color-mix(in srgb, var(--panel) 84%, transparent); */
      background: color-mix(in srgb, #1e1e1e 84%, transparent);
      color:var(--text);
      padding:3px 3px;
      cursor:pointer;
      text-align:center;
      box-shadow: var(--shadow);
    }
    .splash-logo-title{
      margin:0;
      font-size: clamp(26px, 5vw, 56px);
      letter-spacing:.14em;
      line-height:1;
      font-weight:700;
    }
    .splash-logo-sub{
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
      letter-spacing:.2em;
      text-transform:uppercase;
    }
    .splash-logo-image{
      display:block;
      width:min(78vw, 520px);
      height:auto;
    }
    .splash-p5{
      position:absolute;
      inset:0;
      z-index:1;
      pointer-events:none;
    }
    .splash-p5 canvas{
      display:block;
    }
  </style>
</head>

    async function ensureP5() {
      if (window.p5) return;
      await new Promise((resolve, reject) => {
        const existing = document.querySelector('script[data-p5-splash]');
        if (existing) {
          existing.addEventListener("load", resolve, { once: true });
          existing.addEventListener("error", reject, { once: true });
          return;
        }
        const s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js";
        s.async = true;
        s.setAttribute("data-p5-splash", "1");
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    async function initSplashAnimation() {
      if (!splashScreen || !splashP5Host || splashP5Instance || splashScreen.classList.contains("hidden")) return;
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduceMotion) {
        splashP5Host.innerHTML = "";
        return;
      }

      await ensureP5();
      if (!window.p5) return;

      const splashMode = getSplashAnimationMode();

      splashP5Instance = new window.p5((p) => {
        const nodes = [];
        const edges = [];
        const curves = [];
        const flock = [];
        let mouseTarget = null;

        const wrapNode = (n) => {
          if (n.x < -n.r) n.x = p.width + n.r;
          if (n.x > p.width + n.r) n.x = -n.r;
          if (n.y < -n.r) n.y = p.height + n.r;
          if (n.y > p.height + n.r) n.y = -n.r;
        };

        const nearestIndices = (index, limit = 3) => {
          const self = nodes[index];
          const withDist = nodes
            .map((n, i) => ({ i, d: i === index ? Number.POSITIVE_INFINITY : p.dist(self.x, self.y, n.x, n.y) }))
            .filter(x => x.i !== index)
            .sort((a, b) => a.d - b.d);
          return withDist.slice(0, limit).map(x => x.i);
        };

        const buildGraph = () => {
          edges.length = 0;
          const seen = new Set();
          for (let i = 0; i < nodes.length; i += 1) {
            const targetCount = p.floor(p.random(1, 4));
            const near = nearestIndices(i, 6);
            for (let k = 0; k < targetCount && k < near.length; k += 1) {
              const j = near[k];
              const a = Math.min(i, j);
              const b = Math.max(i, j);
              const key = `${a}:${b}`;
              if (seen.has(key)) continue;
              seen.add(key);
              edges.push([a, b]);
            }
          }
        };

        const seedNodes = () => {
          nodes.length = 0;
          const count = 10;
          for (let i = 0; i < count; i += 1) {
            nodes.push({
              x: p.random(p.width),
              y: p.random(p.height),
              r: p.random(8, 24),
              rMin: p.random(6, 14),
              rMax: p.random(18, 30),
              pulse: p.random(0, Math.PI * 2),
              pulseSpeed: p.random(0.012, 0.03),
              dx: p.random(-0.45, 0.45),
              dy: p.random(-0.35, 0.35),
              red: p.random() < 0.35,
            });
          }
          buildGraph();
        };

        const movePoint = (pt) => {
          pt.x += pt.dx;
          pt.y += pt.dy;
          if (pt.x < 0 || pt.x > p.width) {
            pt.dx *= -1;
            pt.x = p.constrain(pt.x, 0, p.width);
          }
          if (pt.y < 0 || pt.y > p.height) {
            pt.dy *= -1;
            pt.y = p.constrain(pt.y, 0, p.height);
          }
        };

        const makePoint = () => ({
          x: p.random(p.width),
          y: p.random(p.height),
          dx: p.random(-0.9, 0.9),
          dy: p.random(-0.9, 0.9)
        });

        const seedBezierCurves = () => {
          curves.length = 0;
          const count = 34; // dense
          const palette = [
            [255, 255, 255, 90],
            [255, 255, 255, 70],
            [255, 24, 24, 88],
            [96, 130, 255, 74]
          ];
          for (let i = 0; i < count; i += 1) {
            curves.push({
              p0: makePoint(),
              p1: makePoint(),
              p2: makePoint(),
              p3: makePoint(),
              color: palette[i % palette.length],
              weight: p.random(0.8, 2.4)
            });
          }
        };

        const seedFlock = () => {
          flock.length = 0;
          const count = 150; // large flock
          mouseTarget = p.createVector(p.width * 0.5, p.height * 0.5);
          for (let i = 0; i < count; i += 1) {
            flock.push({
              pos: p.createVector(p.random(p.width), p.random(p.height)),
              vel: p.createVector(p.random(-2, 2), p.random(-2, 2)),
              acc: p.createVector(0, 0),
              maxSpeed: p.random(1.8, 2.8),
              maxForce: p.random(0.045, 0.085),
              size: p.random(3.6, 6.8),
              purple: p.random() < 0.3
            });
          }
        };

        const steerTowards = (boid, target) => {
          const desired = p5.Vector.sub(target, boid.pos);
          const d = desired.mag();
          if (d < 0.001) return p.createVector(0, 0);
          desired.setMag(boid.maxSpeed);
          const steer = desired.sub(boid.vel);
          steer.limit(boid.maxForce);
          return steer;
        };

        const updateFlock = () => {
          const sensing = 74;
          const avoid = 28;

          const hasMouse = p.mouseX >= 0 && p.mouseX <= p.width && p.mouseY >= 0 && p.mouseY <= p.height;
          const target = hasMouse
            ? p.createVector(p.mouseX, p.mouseY)
            : p.createVector(p.width * 0.5, p.height * 0.5);
          mouseTarget.lerp(target, 0.16);

          for (const b of flock) {
            let total = 0;
            const align = p.createVector(0, 0);
            const cohesion = p.createVector(0, 0);
            const separation = p.createVector(0, 0);

            for (const other of flock) {
              if (other === b) continue;
              const d = p.dist(b.pos.x, b.pos.y, other.pos.x, other.pos.y);
              if (d <= 0 || d > sensing) continue;

              align.add(other.vel);
              cohesion.add(other.pos);
              total += 1;

              if (d < avoid) {
                const diff = p5.Vector.sub(b.pos, other.pos);
                diff.div(Math.max(d * d, 1));
                separation.add(diff);
              }
            }

            b.acc.mult(0);

            if (total > 0) {
              align.div(total).setMag(b.maxSpeed).sub(b.vel).limit(b.maxForce);
              cohesion.div(total);
              const cohForce = steerTowards(b, cohesion).mult(0.72);
              const sepForce = separation.setMag(b.maxSpeed).sub(b.vel).limit(b.maxForce * 1.4).mult(1.08);
              b.acc.add(align.mult(0.85));
              b.acc.add(cohForce);
              b.acc.add(sepForce);
            }

            const seek = steerTowards(b, mouseTarget).mult(1.25);
            b.acc.add(seek);
          }

          for (const b of flock) {
            b.vel.add(b.acc);
            b.vel.limit(b.maxSpeed);
            b.pos.add(b.vel);

            if (b.pos.x < -10) b.pos.x = p.width + 10;
            if (b.pos.x > p.width + 10) b.pos.x = -10;
            if (b.pos.y < -10) b.pos.y = p.height + 10;
            if (b.pos.y > p.height + 10) b.pos.y = -10;
          }
        };

        const drawFlock = () => {
          p.noStroke();
          for (const b of flock) {
            const theta = b.vel.heading() + p.HALF_PI;
            p.push();
            p.translate(b.pos.x, b.pos.y);
            p.rotate(theta);
            if (b.purple) p.fill(170, 98, 255, 210);
            else p.fill(245, 245, 245, 205);
            p.triangle(0, -b.size * 1.45, -b.size * 0.9, b.size, b.size * 0.9, b.size);
            p.pop();
          }
        };

        p.setup = () => {
          const canvas = p.createCanvas(splashP5Host.clientWidth, splashP5Host.clientHeight);
          canvas.parent(splashP5Host);
          p.pixelDensity(1);
          if (splashMode === "bezier") seedBezierCurves();
          else if (splashMode === "flock") seedFlock();
          else seedNodes();
        };

        p.windowResized = () => {
          p.resizeCanvas(splashP5Host.clientWidth, splashP5Host.clientHeight);
          if (splashMode === "bezier") seedBezierCurves();
          else if (splashMode === "flock") seedFlock();
          else seedNodes();
        };

        p.draw = () => {
          p.clear();
          p.background(24, 23, 26, 245);

          if (splashMode === "bezier") {
            p.noFill();
            for (const c of curves) {
              movePoint(c.p0);
              movePoint(c.p1);
              movePoint(c.p2);
              movePoint(c.p3);
              p.stroke(c.color[0], c.color[1], c.color[2], c.color[3]);
              p.strokeWeight(c.weight);
              p.bezier(c.p0.x, c.p0.y, c.p1.x, c.p1.y, c.p2.x, c.p2.y, c.p3.x, c.p3.y);
            }
            return;
          }

          if (splashMode === "flock") {
            updateFlock();
            drawFlock();
            return;
          }

          for (const n of nodes) {
            n.x += n.dx;
            n.y += n.dy;
            n.pulse += n.pulseSpeed;
            n.r = p.map(Math.sin(n.pulse), -1, 1, n.rMin, n.rMax);
            wrapNode(n);
          }

          p.stroke(255, 255, 255, 115);
          p.strokeWeight(1);
          for (const [a, b] of edges) {
            const A = nodes[a];
            const B = nodes[b];
            p.line(A.x, A.y, B.x, B.y);
          }

          p.noStroke();
          for (const n of nodes) {
            if (n.red) p.fill(170, 98, 255, 220);
            else p.fill(255, 255, 255, 205);
            p.circle(n.x, n.y, n.r);
          }
        };
      });
    }


    function destroySplashAnimation() {
      if (!splashP5Instance) return;
      splashP5Instance.remove();
      splashP5Instance = null;
      splashP5Host && (splashP5Host.innerHTML = "");
    }
    let showSplash = true;
    try {
      const ref = document.referrer ? new URL(document.referrer) : null;
      showSplash = !(ref && ref.origin === location.origin);
    } catch {
      showSplash = true;
    }

    if (showSplash) {
      splashScreen?.classList.remove("hidden");
      document.body.classList.add("splash-active");
      initSplashAnimation();
    } else {
      splashScreen?.classList.add("hidden");
      document.body.classList.remove("splash-active");
      destroySplashAnimation();
    }

    topLeftBrand?.addEventListener("click", (e) => {
      e.preventDefault();
      splashScreen?.classList.remove("hidden");
      document.body.classList.add("splash-active");
      initSplashAnimation();
    });

    const closeSplash = () => {
      splashScreen?.classList.add("hidden");
      document.body.classList.remove("splash-active");
      destroySplashAnimation();
    };

    splashScreen?.addEventListener("click", closeSplash);
    splashLogo?.addEventListener("click", closeSplash);

    // ---- Data source: Admin localStorage first, fallback JSON ----
    const ADMIN_STORAGE_KEY = "toji_admin_state_v1";
    const HOME_HERO_VISIBLE_KEY = "toji_home_hero_visible_v1";

    async function loadHomeState() {
      const saved = localStorage.getItem(ADMIN_STORAGE_KEY);
      if (saved) {
        try {
          return JSON.parse(saved);
        } catch {
          // fall through
        }
      }
      const res = await fetch(FALLBACK_URL, { cache: "no-store" });
      return res.json();
    }

    // ---- Lightbox ----
    const lightbox = createArtworkLightboxController();
    document.body.appendChild(lightbox.host);
    const openLightbox = (list, idx) => lightbox.open(list, idx);

    // ---- Render UI ----
    const featuredSection = document.getElementById("featuredSection");
    const featuredStrip = document.getElementById("featuredStrip");
    const featuredHint = document.getElementById("featuredHint");
    const homeSeriesSection = document.getElementById("homeSeriesSection");
    const homeSeriesGrid = document.getElementById("homeSeriesGrid");
    const homeSeriesHint = document.getElementById("homeSeriesHint");
    const homeHeroSection = document.getElementById("homeHeroSection");
    const featuredSlideshowSection = document.getElementById("featuredSlideshowSection");
    const featuredSlideshow = document.getElementById("featuredSlideshow");
    const featuredSlideshowHint = document.getElementById("featuredSlideshowHint");

    const latestSection = document.getElementById("latestSection");
    const latestGrid = document.getElementById("latestGrid");
    const latestHint = document.getElementById("latestHint");
    const heroRaw = localStorage.getItem(HOME_HERO_VISIBLE_KEY);
    const isHeroVisible = heroRaw == null ? true : heroRaw === "1";
    const featuredRaw = localStorage.getItem(HOME_FEATURED_VISIBLE_KEY);
    const isFeaturedVisible = featuredRaw == null ? true : featuredRaw === "1";
    const seriesRaw = localStorage.getItem(HOME_SERIES_VISIBLE_KEY);
    const isSeriesVisible = seriesRaw == null ? true : seriesRaw === "1";
    const slideshowRaw = localStorage.getItem(HOME_FEATURED_SLIDESHOW_VISIBLE_KEY);
    const isSlideshowVisible = slideshowRaw == null ? true : slideshowRaw === "1";
    const isLatestVisible = localStorage.getItem(HOME_LATEST_VISIBLE_KEY) === "1";
    if (homeHeroSection) homeHeroSection.style.display = isHeroVisible ? "" : "none";
    latestSection.style.display = isLatestVisible ? "" : "none";

    const state = await loadHomeState();
    const all = sortGallery((state.artworks || []).filter(a => a.status === "published"));
    const seriesMetaRows = Object.values(state.seriesMeta || {});
    const seriesMetaByName = new Map(
      seriesMetaRows
        .filter(m => m && m.name)
        .map(m => [String(m.name).trim().toLowerCase(), m])
    );
    const seriesMetaBySlug = new Map(
      seriesMetaRows
        .filter(m => m && m.slug)
        .map(m => [String(m.slug).trim().toLowerCase(), m])
    );
    const featured = sortGallery(all.filter(a => a.featured));

    if (isFeaturedVisible) {
      renderFeatured(featured);
    } else {
      featuredSection.style.display = "none";
    }

    // Latest (excluding featured duplicates)
    if (isLatestVisible) {
      const latest = sortGallery(all.filter(a => !a.featured)).slice(0, 9);
      renderLatest(latest);
    }

    if (isSeriesVisible) {
      renderSeries(all);
    } else if (homeSeriesSection) {
      homeSeriesSection.style.display = "none";
    }

        function renderFeaturedSlideshow(items) {
      if (!featuredSlideshowSection || !featuredSlideshow || !featuredSlideshowHint) return;

      if (!items.length || !isSlideshowVisible) {
        featuredSlideshowSection.style.display = "none";
        featuredSlideshow.innerHTML = "";
        return;
      }

      featuredSlideshowSection.style.display = "";
      featuredSlideshowHint.textContent = `${items.length} image${items.length === 1 ? "" : "s"}`;
      featuredSlideshow.innerHTML = "";

      const carousel = el("div", { class: "home-slideshow-carousel" });
      const track = el("div", { class: "home-slideshow-track" });
      const loops = [...items, ...items];
      const speedPerItem = 5.5;
      const duration = Math.max(24, loops.length * speedPerItem);
      track.style.setProperty("--carousel-duration", `${duration}s`);

      loops.forEach((a) => {
        const realIndex = items.findIndex(x => x.id === a.id);
        track.appendChild(
          el("a", {
            class: "home-slideshow-item",
            href: `artwork.html?id=${encodeURIComponent(a.id)}`,
            onclick: (e) => { e.preventDefault(); openLightbox(items, Math.max(0, realIndex)); }
          },
            el("img", { src: a.image || a.thumb, alt: a.alt || a.title || "Featured artwork", loading: "lazy" })
          )
        );
      });

      carousel.appendChild(track);
      featuredSlideshow.appendChild(carousel);
    }

    renderFeaturedSlideshow(featured);

    function renderSeries(items) {
      if (!homeSeriesSection || !homeSeriesGrid || !homeSeriesHint) return;

      const withSeries = sortGallery(items.filter(a => a.series));
      const bySeries = new Map();
      for (const a of withSeries) {
        const key = String(a.series || "").trim();
        if (!key) continue;
        if (!bySeries.has(key)) bySeries.set(key, []);
        bySeries.get(key).push(a);
      }

      const entries = Array.from(bySeries.entries())
        .map(([name, list]) => {
          const slug = slugifySeries(name);
          const meta = seriesMetaByName.get(name.toLowerCase()) || seriesMetaBySlug.get(slug) || null;
          const cover = (meta && meta.coverThumb) || list[0]?.thumb || list[0]?.image || "assets/img/placeholders/p1.jpg";
          const description = (meta && meta.description) || "";
          const sortOrder = Number((meta && meta.sortOrder) || 0);
          const items = sortGallery(list);
          return { name, slug, cover, description, count: items.length, sortOrder, items };
        })
        .sort((a, b) => (a.sortOrder - b.sortOrder) || a.name.localeCompare(b.name));

      homeSeriesGrid.innerHTML = "";
      if (!entries.length) {
        homeSeriesSection.style.display = "none";
        return;
      }

      homeSeriesSection.style.display = "";
      homeSeriesHint.textContent = `${entries.length} series`;

      for (const s of entries) {
        homeSeriesGrid.appendChild(
          el("article", { class: "home-series-item" },
            el("a", {
              class: "card",
              href: "#",
              onclick: (e) => {
                e.preventDefault();
                openLightbox(s.items, 0);
              }
            },
              el("div", { class: "thumb" },
                el("img", { src: s.cover, alt: `${s.name} series`, loading: "lazy" })
              ),
              el("div", { class: "meta" },
                el("p", { class: "title" }, s.name),
                el("p", { class: "sub" }, `${s.count} piece${s.count === 1 ? "" : "s"}`)
              )
            )
          )
        );
      }
    }

    function renderFeatured(items) {
      featuredStrip.innerHTML = "";

      if (!items.length) {
        featuredSection.style.display = "none";
        return;
      }

      featuredSection.style.display = "";
      featuredHint.textContent = `${items.length} piece${items.length === 1 ? "" : "s"}`;

      items.forEach((a, idx) => {
        const card = el("a", {
          class: "card",
          href: `artwork.html?id=${encodeURIComponent(a.id)}`,
          style: "",
          //onclick: null // (e)=>{ e.preventDefault(); openLightbox(items, idx); }
          onclick: (e)=>{ e.preventDefault(); openLightbox(items, idx); }
        },
          el("div", { class: "thumb" },
            el("img", { src: a.thumb || a.image, alt: a.alt || a.title || "Artwork", loading: "lazy" })
          ),
          el("div", { class: "meta" },
            el("p", { class: "title" }, a.title || "Untitled"),
            el("p", { class: "sub" }, [a.series || null, a.year || null].filter(Boolean).join(" • ") || " ")
          )
        );

        featuredStrip.appendChild(card);
      });
    }

    function renderLatest(items) {
      latestGrid.innerHTML = "";
      latestHint.textContent = `${items.length} piece${items.length === 1 ? "" : "s"}`;

      if (!items.length) {
        latestGrid.appendChild(
          el("div", { class: "card", style: "grid-column: span 12; box-shadow:none" },
            el("div", { class: "meta" },
              el("p", { class: "title" }, "No published work yet"),
              el("p", { class: "sub" }, "Publish pieces in Studio to populate the homepage.")
            )
          )
        );
        return;
      }

      items.forEach((a, idx) => {
        const card = el("a", {
          class: "card",
          href: `artwork.html?id=${encodeURIComponent(a.id)}`,
          style: `
            grid-column: span 4;
            box-shadow:none;
          `,
          onclick:(e)=>{ e.preventDefault(); openLightbox(items, idx); }
        },
          el("div", { class: "thumb" },
            el("img", { src: a.thumb || a.image, alt: a.alt || a.title || "Artwork", loading: "lazy" })
          ),
          el("div", { class: "meta" },
            el("p", { class: "title" }, a.title || "Untitled"),
            el("p", { class: "sub" }, [a.series || null, a.year || null].filter(Boolean).join(" • ") || " ")
          )
        );

        latestGrid.appendChild(card);
      });

      // Responsive spans
      const mq1 = window.matchMedia("(max-width: 920px)");
      const mq2 = window.matchMedia("(max-width: 620px)");
      const applySpans = () => {
        const span = mq2.matches ? 12 : (mq1.matches ? 6 : 4);
        latestGrid.querySelectorAll(".card").forEach(c => c.style.gridColumn = `span ${span}`);
      };
      applySpans();
      mq1.onchange = applySpans;
      mq2.onchange = applySpans;
    }
  </script>
</body>

</html>
