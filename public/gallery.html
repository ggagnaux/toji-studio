<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gallery — Toji Studios</title>
  <link rel="stylesheet" href="assets/css/site.css" />
</head>
<body>
  <header id="siteHeader"></header>

  <main class="container">
    <section class="hero" style="padding-bottom:10px">
      <h1>Gallery</h1>
      <p>Browse the work. Filter by tag. Open any piece to view it larger.</p>
    </section>

    <!-- Your gallery UI here -->
    <section class="grid" id="galleryGrid" aria-label="Gallery grid"></section>
  </main>

  <footer id="siteFooter"></footer>

  <script type="module">
    import { renderPublicHeader } from "./assets/js/header.js";
    import { renderPublicFooter } from "./assets/js/footer.js";

    renderPublicHeader({ active: "gallery", small: "gallery", ctaText: "Inquire", ctaHref: "contact.html" });
    renderPublicFooter({
      rightHtml: `<a href="index.html">Home</a> • <a href="about.html">About</a> • <a href="contact.html">Contact</a> • <a href="admin/index.html">Studio</a>`
    });

    // your existing gallery JS goes here (render cards, filters, lightbox, etc.)
  </script>
</body>
</html>
