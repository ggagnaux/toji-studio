<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Series &mdash; Toji Studios</title>
  <link rel="stylesheet" href="assets/css/site.css" />
  <link rel="stylesheet" href="assets/css/series.css" />
</head>
<body class="home-animated">
  <header id="siteHeader"></header>

  <main class="container page-with-sticky-hero">
    <section class="page-toolbar page-toolbar--public" aria-label="Series tools">
      <div class="page-toolbar__shell">
        <div class="page-toolbar__left">
          <a class="page-toolbar__pill is-active" href="#seriesListPanel" aria-current="page">All Series</a>
          <a class="page-toolbar__pill" href="gallery.html">Gallery</a>
          <a class="page-toolbar__pill" href="contact.html">Contact</a>
        </div>
        <div class="page-toolbar__right">
          <div class="segmented page-toolbar__theme" role="group" aria-label="Theme mode">
            <button type="button" data-theme-choice="system">System</button>
            <button type="button" data-theme-choice="light">Light</button>
            <button type="button" data-theme-choice="dark">Dark</button>
          </div>
        </div>
      </div>
    </section>
    <section class="hero hero--sticky" style="padding-bottom:10px">
      <h1>Series</h1>
      <p>Browse collections.</p>
      <!-- <p>Browse collections. Each series includes its own description and ordered pieces.</p> -->
    </section>

    <section class="grid" aria-label="Series layout">
      <!-- Left: series list -->
		      <div id="seriesListPanel" class="card series-panel series-panel--list page-toolbar-target" style="grid-column: span 5">
        <div class="meta">
          <div style="display:flex; align-items:end; justify-content:space-between; gap:10px">
            <p class="title" style="margin:0">All series</p>
            <span class="sub" id="seriesCount">&mdash;</span>
          </div>

          <div id="seriesList" style="display:grid; gap:10px; margin-top:14px"></div>

          <!-- <div class="sub" style="margin-top:14px">
            Tip: publish + assign series in Studio to populate this page.
          </div> -->
        </div>
      </div>

      <!-- Right: series detail -->
		      <div id="seriesDetailPanel" class="card series-panel series-panel--detail page-toolbar-target" style="grid-column: span 7; min-width:0">
        <div class="meta" id="detail">
          <p class="title" style="margin:0">Pick a series</p>
          <p class="sub" style="margin-top:8px">Select a series on the left to view its pieces.</p>
        </div>
      </div>
    </section>
  </main>

  <footer id="siteFooter"></footer>

  <script type="module" src="./assets/js/series-page.js"></script>
</body>
</html>
