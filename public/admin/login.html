<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Studio - Admin Login</title>
  <link rel="stylesheet" href="../assets/css/site.css" />
</head>
<body>
  <main class="container" style="max-width: 560px; padding-top: min(10vh, 80px);">
    <section class="card">
      <div class="meta" style="display:grid; gap:12px;">
        <h1 style="margin:0; font-size: clamp(24px, 4vw, 32px);">Admin Login</h1>
        <p class="sub" style="margin:0;">Sign in to access Studio admin pages.</p>

        <form id="loginForm" style="display:grid; gap:10px; margin-top:8px;">
          <label class="field">
            <div class="sub" style="margin-bottom:8px;">Password</div>
            <input id="password" type="password" autocomplete="current-password" required />
          </label>

          <label class="field">
            <div class="sub" style="margin-bottom:8px;">Admin token</div>
            <input id="token" type="password" autocomplete="off" placeholder="Paste ADMIN_TOKEN from .env" required />
          </label>

          <p class="sub" style="margin:0;">API-backed admin pages need the same <code>ADMIN_TOKEN</code> the server is using.</p>

          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <button class="btn primary" type="submit">Sign in</button>
            <a class="btn" href="../index.html">Back to site</a>
            <span id="status" class="sub" aria-live="polite"></span>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script type="module" src="./js/login.js"></script>
</body>
</html>
