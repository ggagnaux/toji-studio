<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gallery — Toji Studios</title>
  <link rel="stylesheet" href="assets/css/site.css" />
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a class="brand" href="index.html">Toji Studios <small>gallery</small></a>
      <nav class="navlinks">
        <a href="index.html">Home</a>
        <a class="active" href="gallery.html">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <a class="btn" href="contact.html">Inquire</a>
        <div class="theme-controls">
        <div class="segmented" role="group" aria-label="Theme mode">
            <button type="button" data-theme-mode="system">System</button>
            <button type="button" data-theme-mode="light">Light</button>
            <button type="button" data-theme-mode="dark">Dark</button>
        </div>

        <button class="icon-btn" type="button" data-theme-icon aria-label="Toggle theme"></button>
        </div>
    </div>
  </header>


<div id="lightbox" class="lightbox" aria-hidden="true">
  <div class="backdrop" data-lb-close></div>

  <div id="lbPanel" class="panel" role="dialog" aria-modal="true" aria-label="Artwork viewer" tabindex="-1">
    <div class="topbar">
      <div class="title">
        <b id="lbTitle">—</b>
        <span id="lbMeta">—</span>
      </div>

      <div class="actions">
        <a id="lbDetails" class="btn" href="#">Open details</a>
        <button id="lbClose" class="icon-btn" type="button" data-lb-close aria-label="Close">✕</button>
      </div>
    </div>

    <div class="stage">
      <button class="lb-nav lb-prev" type="button" data-lb-prev aria-label="Previous">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 19 8.5 12l7-7"/></svg>
      </button>

      <img id="lbImg" alt="" />

      <button class="lb-nav lb-next" type="button" data-lb-next aria-label="Next">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.5 5 15.5 12l-7 7"/></svg>
      </button>
    </div>

    <div id="lbCaption" class="caption"></div>
  </div>
</div>





  <main class="container">
    <section class="hero" style="padding-bottom:0">
      <h1>Gallery</h1>
      <p>Filter by tag and explore the full collection.</p>
    </section>

    <div id="filters" class="filters"></div>
    <section id="grid" class="grid"></section>

    <footer class="footer">
      <div class="row">
        <div>© <span id="y"></span> Toji Studios</div>
        <div>Built with plain HTML + JS</div>
      </div>
    </footer>
  </main>

  <script type="module">
    import { loadGallery, el, uniqTags, initThemeSystem} from "./assets/js/site.js";

    initThemeSystem();
    
    document.getElementById("y").textContent = new Date().getFullYear();
    const items = await loadGallery();
    let activeTag = "all";
    let q = "";

    const filtersHost = document.getElementById("filters");
    const grid = document.getElementById("grid");

    const search = el("div", { class:"search" },
      el("span", {}, "Search"),
      el("input", { placeholder:"title or tag…", oninput:(e)=>{ q=e.target.value.toLowerCase(); render(); } })
    );

    function renderFilters(){
      filtersHost.innerHTML = "";
      uniqTags(items).forEach(tag => {
        filtersHost.appendChild(
          el("div", {
            class: "chip" + (tag===activeTag ? " active" : ""),
            onclick: ()=>{ activeTag = tag; renderFilters(); render(); }
          }, tag)
        );
      });
      filtersHost.appendChild(search);
    }

    function matches(item){
      const tagOk = activeTag === "all" || (item.tags||[]).includes(activeTag);
      const text = (item.title + " " + (item.tags||[]).join(" ")).toLowerCase();
      const qOk = !q || text.includes(q);
      return tagOk && qOk;
    }

    // function render(){
    //   grid.innerHTML = "";
    //   items.filter(matches).forEach((item, i) => {
    //     // simple responsive spans (varied a bit for rhythm)
    //     const span = (i % 7 === 0) ? 6 : 4;
    //     grid.appendChild(
    //       el("a", { class:"card", href:`artwork.html?id=${item.id}`, style:`grid-column: span ${span}` },
    //         el("div", { class:"thumb" }, el("img", { src:item.thumb, alt:item.title, loading:"lazy" })),
    //         el("div", { class:"meta" },
    //           el("p", { class:"title" }, item.title),
    //           el("p", { class:"sub" }, `${item.year} • ${(item.tags||[]).join(" · ")}`)
    //         )
    //       )
    //     );
    //   });
    // }


    function render(){
        grid.innerHTML = "";
        visible = items.filter(matches);

        visible.forEach((item, i) => {
            const span = (i % 7 === 0) ? 6 : 4;

            const card = el("a", {
            class:"card",
            href:`artwork.html?id=${item.id}`,
            style:`grid-column: span ${span}`,
            onclick:(e)=>
                { 
                    e.preventDefault(); 
                    // for returning focus after closing lightbox
                    lastFocusEl = e.currentTarget; 
                    openLightbox(i); 
                }
            },
            el("div", { class:"thumb" }, el("img", { src:item.thumb, alt:item.title, loading:"lazy" })),
            el("div", { class:"meta" },
                el("p", { class:"title" }, item.title),
                el("p", { class:"sub" }, `${item.year} • ${(item.tags||[]).join(" · ")}`)
            )
            );

            grid.appendChild(card);
        });

        // If a hash is present, try to keep the selected item open after filtering/searching
        if (location.hash) restoreFromHash();

    }



    const lb = document.getElementById("lightbox");
    const lbImg = document.getElementById("lbImg");
    const lbTitle = document.getElementById("lbTitle");
    const lbMeta = document.getElementById("lbMeta");
    const lbCaption = document.getElementById("lbCaption");
    const lbDetails = document.getElementById("lbDetails");

    let visible = [];   // current filtered list
    let activeIndex = -1;

    let lastFocusEl = null;


    function indexById(id){
        return visible.findIndex(x => x.id === id);
    }

    function setHash(id){
        const next = id ? `#${encodeURIComponent(id)}` : "#";
        // pushState makes back/forward work naturally
        history.pushState(null, "", next === "#" ? location.pathname : next);
    }

    function restoreFromHash(){
        const id = decodeURIComponent((location.hash || "").replace("#","")).trim();
        if (!id) return;

        const idx = indexById(id);
        if (idx >= 0) openLightbox(idx);
    }




    function openLightbox(index){
        activeIndex = index;
        const item = visible[activeIndex];
        if (!item) return;

        setHash(item.id)

        lb.classList.add("open");
        lb.setAttribute("aria-hidden", "false");

        // Prefer large image if you have it; otherwise fallback
        lbImg.src = item.image || item.thumb;
        lbImg.alt = item.title;

        lbTitle.textContent = item.title;
        lbMeta.textContent = `${item.year || ""}${item.tags?.length ? " • " + item.tags.join(" · ") : ""}`;
        lbCaption.textContent = item.description || "";

        lbDetails.href = `artwork.html?id=${item.id}`;

        // Move focus into the lightbox
        const closeBtn = document.getElementById("lbClose");
        closeBtn?.focus();


        // optional: prevent background scroll while open
        document.body.style.overflow = "hidden";
    }

    function closeLightbox(){
        lb.classList.remove("open");
        lb.setAttribute("aria-hidden", "true");
        lbImg.src = "";
        document.body.style.overflow = "";

        // Clear hash but keep the same page URL (no extra navigation)
        if (location.hash) history.pushState(null, "", location.pathname);

        // Restore focus to the item card that launched the lightbox
        if (lastFocusEl && typeof lastFocusEl.focus === "function") {
            lastFocusEl.focus();
        }
    }

    function step(dir){
        if (!lb.classList.contains("open")) return;
        if (!visible.length) return;
        activeIndex = (activeIndex + dir + visible.length) % visible.length;
        openLightbox(activeIndex);
    }

    function getFocusable(container){
        return Array.from(container.querySelectorAll(`
            a[href], button:not([disabled]), textarea, input, select, [tabindex]:not([tabindex="-1"])
        `)).filter(el => !el.hasAttribute("disabled") && !el.getAttribute("aria-hidden"));
    }


    // close buttons / backdrop
    document.addEventListener("click", (e) => {
        if (e.target?.matches?.("[data-lb-close]")) closeLightbox();
    });

    // nav buttons
    document.addEventListener("click", (e) => {
        if (e.target.closest?.("[data-lb-prev]")) step(-1);
        if (e.target.closest?.("[data-lb-next]")) step(1);
    });

    // keyboard
    document.addEventListener("keydown", (e) => {
    if (!lb.classList.contains("open")) return;

    // Focus trap
    if (e.key === "Tab") {
        const panel = document.getElementById("lbPanel");
        const focusables = getFocusable(panel);
        if (!focusables.length) return;

        const first = focusables[0];
        const last = focusables[focusables.length - 1];

        if (e.shiftKey && document.activeElement === first) {
        e.preventDefault();
        last.focus();
        return;
        }
        if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault();
        first.focus();
        return;
        }
    }

    // Existing keys
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowLeft") step(-1);
    if (e.key === "ArrowRight") step(1);
    });

    window.addEventListener("popstate", () => {
        const id = decodeURIComponent((location.hash || "").replace("#","")).trim();

        // If hash removed, close
        if (!id) return closeLightbox();

        // If hash exists, open that piece (if present)
        const idx = indexById(id);
        if (idx >= 0) openLightbox(idx);
    });


    renderFilters();
    render();
    restoreFromHash();


  </script>
</body>
</html>
