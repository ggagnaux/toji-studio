<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Series — Toji Studios</title>
  <link rel="stylesheet" href="assets/css/site.css" />
</head>
<body class="home-animated">
  <header id="siteHeader"></header>

  <main class="container">
    <section class="hero" style="padding-bottom:10px">
      <h1>Series</h1>
      <p>Browse collections. Each series includes its own description and ordered pieces.</p>
    </section>

    <section class="grid" aria-label="Series layout">
      <!-- Left: series list -->
      <div class="card" style="grid-column: span 5">
        <div class="meta">
          <div style="display:flex; align-items:end; justify-content:space-between; gap:10px">
            <p class="title" style="margin:0">All series</p>
            <span class="sub" id="seriesCount">—</span>
          </div>

          <div id="seriesList" style="display:grid; gap:10px; margin-top:14px"></div>

          <div class="sub" style="margin-top:14px">
            Tip: publish + assign series in Studio to populate this page.
          </div>
        </div>
      </div>

      <!-- Right: series detail -->
      <div class="card" style="grid-column: span 7">
        <div class="meta" id="detail">
          <p class="title" style="margin:0">Pick a series</p>
          <p class="sub" style="margin-top:8px">Select a series on the left to view its pieces.</p>
        </div>
      </div>
    </section>
  </main>

  <footer id="siteFooter"></footer>

  <script type="module">
    import { renderPublicHeader } from "./assets/js/header.js";
    import { renderPublicFooter } from "./assets/js/footer.js";

    renderPublicHeader({ active: "series", small: "series", ctaText: "Explore", ctaHref: "gallery.html" });
    renderPublicFooter({
      rightHtml: `<a href="index.html">Home</a> • <a href="gallery.html">Gallery</a> • <a href="series.html">Series</a> • <a href="about.html">About</a> • <a href="contact.html">Contact</a> • <a href="admin/index.html">Studio</a>`
    });

    // -------- Data sources --------
    const ADMIN_STORAGE_KEY = "toji_admin_state_v1";
    const FALLBACK_URL = "assets/data/admin.sample.json";
    const API_BASE = localStorage.getItem("toji_api_base") || "http://localhost:5179";

    function qs(name){ return new URLSearchParams(location.search).get(name); }
    function setQS(name, value){
      const u = new URL(location.href);
      if (!value) u.searchParams.delete(name);
      else u.searchParams.set(name, value);
      history.replaceState(null, "", u.toString());
    }

    function normalizeMediaUrl(p){
      if (!p) return p;
      if (p.startsWith("http")) return p;
      if (p.startsWith("/")) return `${API_BASE}${p}`;
      return p;
    }

    async function tryFetchJson(url){
      try{
        const res = await fetch(url, { cache:"no-store" });
        if (!res.ok) return null;
        return await res.json();
      }catch{
        return null;
      }
    }

    async function loadLocalState(){
      const saved = localStorage.getItem(ADMIN_STORAGE_KEY);
      if (saved) {
        try { return JSON.parse(saved); } catch {}
      }
      const res = await fetch(FALLBACK_URL, { cache:"no-store" });
      return res.json();
    }

    // Load from backend if available, else local
    async function loadPublishedArtworks(){
      const rows = await tryFetchJson(`${API_BASE}/api/public/artworks`);
      if (rows) {
        return (rows || []).map(a => ({
          ...a,
          thumb: normalizeMediaUrl(a.thumb),
          image: normalizeMediaUrl(a.image)
        }));
      }
      const state = await loadLocalState();
      const items = (state.artworks || []).filter(a => a.status === "published");
      // Local items may already have absolute media URLs; keep as-is.
      return items;
    }

    async function loadPublicSeries(){
      const rows = await tryFetchJson(`${API_BASE}/api/public/series`);
      if (rows) {
        return (rows || []).map(s => ({
          ...s,
          coverThumb: normalizeMediaUrl(s.coverThumb)
        }));
      }

      // Local fallback: derive series list from state.seriesMeta OR artworks
      const state = await loadLocalState();
      const published = (state.artworks || []).filter(a => a.status === "published");
      const seriesMeta = state.seriesMeta || {};

      // seriesMeta might be keyed by slug (from Studio)
      const fromMeta = Object.values(seriesMeta).map(m => ({
        slug: m.slug || slugify(m.name || ""),
        name: m.name || m.slug,
        description: m.description || "",
        sortOrder: Number(m.sortOrder || 0),
        isPublic: m.isPublic !== false,
        coverArtworkId: m.coverArtworkId || "",
        coverThumb: m.coverThumb || ""
      })).filter(s => s.name);

      if (fromMeta.length) {
        // Add counts in fallback mode
        const counts = new Map();
        for (const a of published){
          if (!a.series) continue;
          counts.set(a.series, (counts.get(a.series) || 0) + 1);
        }
        return fromMeta
          .filter(s => s.isPublic)
          .map(s => ({ ...s, publishedCount: counts.get(s.name) || 0 }))
          .sort((a,b) => (a.sortOrder - b.sortOrder) || a.name.localeCompare(b.name));
      }

      // Otherwise derive by unique series names
      const names = Array.from(new Set(published.map(a => a.series).filter(Boolean))).sort();
      return names.map((name, i) => ({
        slug: slugify(name),
        name,
        description: "",
        sortOrder: i * 10,
        isPublic: true,
        coverArtworkId: "",
        coverThumb: "",
        publishedCount: published.filter(a => a.series === name).length
      }));
    }

    function slugify(s){
      return String(s||"")
        .trim().toLowerCase()
        .replace(/[^a-z0-9]+/g,"-")
        .replace(/^-+|-+$/g,"")
        .slice(0,80);
    }

    function sortPieces(items){
      return items.slice().sort((a,b) => {
        const soA = Number(a.sortOrder || 0), soB = Number(b.sortOrder || 0);
        if (soA !== soB) return soB - soA;
        const da = (a.publishedAt || a.createdAt || ""), db = (b.publishedAt || b.createdAt || "");
        return String(db).localeCompare(String(da));
      });
    }

    function el(tag, attrs = {}, ...children){
      const n = document.createElement(tag);
      for (const [k,v] of Object.entries(attrs)) {
        if (k === "class") n.className = v;
        else if (k === "style") n.setAttribute("style", v);
        else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2), v);
        else if (v !== undefined && v !== null) n.setAttribute(k, v);
      }
      for (const c of children.flat()) {
        if (c == null) continue;
        n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
      }
      return n;
    }

    // ---- Lightbox (same behavior) ----
    const lightbox = createLightbox();
    document.body.appendChild(lightbox.host);

    let currentList = [];
    let currentIndex = -1;

    function openLightbox(list, idx){
      currentList = list;
      currentIndex = idx;
      lightbox.open(currentList[currentIndex]);
    }
    function next(){
      if (!currentList.length) return;
      currentIndex = (currentIndex + 1) % currentList.length;
      lightbox.open(currentList[currentIndex]);
    }
    function prev(){
      if (!currentList.length) return;
      currentIndex = (currentIndex - 1 + currentList.length) % currentList.length;
      lightbox.open(currentList[currentIndex]);
    }

    function createLightbox(){
      const style = document.createElement("style");
      style.textContent = `
        .lb-backdrop{
          position:fixed; inset:0; z-index:1000;
          background: rgba(0,0,0,.72);
          display:none; align-items:center; justify-content:center;
          padding: 24px;
        }
        [data-theme="light"] .lb-backdrop{ background: rgba(0,0,0,.55); }
        .lb{
          width:min(1100px, 96vw);
          border:1px solid var(--line);
          border-radius: var(--radius);
          background: var(--panel);
          box-shadow: var(--shadow);
          overflow:hidden;
        }
        .lb-top{
          display:flex; align-items:center; justify-content:space-between;
          gap:10px; padding:12px;
          border-bottom:1px solid var(--line);
        }
        .lb-title{ font-weight:650; }
        .lb-body{ display:grid; grid-template-columns: 1fr 320px; }
        .lb-media{
          background: rgba(255,255,255,.03);
          display:flex; align-items:center; justify-content:center;
          min-height: 56vh;
        }
        .lb-media img{
          width:100%; height:100%;
          max-height: 76vh;
          object-fit: contain;
          background: var(--bg);
        }
        .lb-meta{ padding:14px; border-left:1px solid var(--line); }
        .lb-actions{ display:flex; gap:8px; flex-wrap:wrap; }
        .lb-actions .btn{ padding:8px 10px; font-size:13px; }
        @media (max-width: 920px){
          .lb-body{ grid-template-columns: 1fr; }
          .lb-meta{ border-left:0; border-top:1px solid var(--line); }
        }
      `;
      document.head.appendChild(style);

      const backdrop = el("div", { class:"lb-backdrop", role:"dialog", "aria-modal":"true" });

      const title = el("div", { class:"lb-title" }, "");
      const closeBtn = el("button", { class:"btn", type:"button" }, "Close");
      const prevBtn = el("button", { class:"btn", type:"button" }, "Prev");
      const nextBtn = el("button", { class:"btn", type:"button" }, "Next");

      const top = el("div", { class:"lb-top" },
        title,
        el("div", { class:"lb-actions" }, prevBtn, nextBtn, closeBtn)
      );

      const img = el("img", { alt:"" });
      const media = el("div", { class:"lb-media" }, img);

      const metaTitle = el("div", { style:"font-weight:650" }, "");
      const metaSub = el("div", { class:"sub" }, "");
      const metaDesc = el("div", { class:"sub", style:"font-size:15px; line-height:1.65" }, "");
      const meta = el("div", { class:"lb-meta" }, metaTitle, metaSub, el("hr", { class:"sep" }), metaDesc);

      const panel = el("div", { class:"lb" }, top, el("div", { class:"lb-body" }, media, meta));
      backdrop.appendChild(panel);

      let lastActive = null;

      function open(item){
        lastActive = document.activeElement;

        title.textContent = item.title || "Untitled";
        metaTitle.textContent = item.title || "Untitled";

        const bits = [item.series || null, item.year || null, item.featured ? "Featured" : null]
          .filter(Boolean).join(" • ");
        metaSub.textContent = bits || "";
        metaDesc.textContent = item.description || "";

        img.src = item.image || item.thumb || "";
        img.alt = item.alt || item.title || "Artwork";

        backdrop.style.display = "flex";
        closeBtn.focus();
      }

      function close(){
        backdrop.style.display = "none";
        if (lastActive && typeof lastActive.focus === "function") lastActive.focus();
      }

      backdrop.addEventListener("click", (e) => { if (e.target === backdrop) close(); });
      closeBtn.addEventListener("click", close);
      nextBtn.addEventListener("click", () => next());
      prevBtn.addEventListener("click", () => prev());

      document.addEventListener("keydown", (e) => {
        if (backdrop.style.display !== "flex") return;
        if (e.key === "Escape") close();
        if (e.key === "ArrowRight") next();
        if (e.key === "ArrowLeft") prev();
      });

      return { host: backdrop, open, close };
    }

    // ---- Render ----
    const seriesCountEl = document.getElementById("seriesCount");
    const seriesList = document.getElementById("seriesList");
    const detail = document.getElementById("detail");

    const [seriesRows, published] = await Promise.all([
      loadPublicSeries(),
      loadPublishedArtworks()
    ]);

    // Filter out empty series (no pieces)
    const seriesWithCounts = (seriesRows || [])
      .map(s => {
        const count = (s.publishedCount != null)
          ? Number(s.publishedCount || 0)
          : published.filter(a => a.series === s.name).length;
        return { ...s, publishedCount: count };
      })
      .filter(s => s.publishedCount > 0);

    seriesCountEl.textContent = `${seriesWithCounts.length} series`;

    const bySlug = new Map(seriesWithCounts.map(s => [s.slug, s]));
    const byName = new Map(seriesWithCounts.map(s => [s.name, s]));

    function renderSeriesList(activeSlug){
      seriesList.innerHTML = "";

      // All button
      seriesList.appendChild(
        el("button", {
          class:"btn",
          type:"button",
          style: `
            justify-content:flex-start; border-radius:14px; text-align:left; padding:12px;
            ${!activeSlug ? "border-color: rgba(138,167,255,.35); background: rgba(138,167,255,.10);" : ""}
          `
        },
          el("div", { style:"display:grid; gap:4px" },
            el("div", { style:"font-weight:650" }, "All series"),
            el("div", { class:"sub" }, "Overview + counts")
          )
        )
      ).addEventListener("click", () => {
        setQS("s", "");
        renderOverview();
      });

      if (!seriesWithCounts.length){
        seriesList.appendChild(el("div", { class:"sub" }, "No series yet."));
        return;
      }

      for (const s of seriesWithCounts){
        const isActive = s.slug === activeSlug;
        const btn = el("button", {
          class:"btn",
          type:"button",
          style: `
            justify-content:flex-start; text-align:left; padding:12px; border-radius:14px;
            ${isActive ? "border-color: rgba(138,167,255,.35); background: rgba(138,167,255,.10);" : ""}
          `
        },
          el("div", { style:"display:flex; gap:12px; align-items:center" },
            s.coverThumb ? el("img", { src:s.coverThumb, style:"width:48px;height:48px;border-radius:10px;object-fit:cover;border:1px solid var(--line)" }) : null,
            el("div", { style:"display:grid; gap:4px; min-width:0" },
              el("div", { style:"font-weight:650; overflow:hidden; text-overflow:ellipsis; white-space:nowrap" }, s.name),
              el("div", { class:"sub" }, `${s.publishedCount} piece${s.publishedCount===1?"":"s"} • Order ${Number(s.sortOrder||0)}`)
            )
          )
        );

        btn.addEventListener("click", () => {
          setQS("s", s.slug);
          openSeries(s.slug);
        });

        seriesList.appendChild(btn);
      }
    }

    function renderOverview(){
      detail.innerHTML = "";
      detail.appendChild(el("p", { class:"title", style:"margin:0" }, "Series overview"));
      detail.appendChild(el("p", { class:"sub", style:"margin-top:8px" }, "Pick a series to view its pieces."));

      const wrap = el("div", { style:"display:grid; gap:10px; margin-top:14px" });

      for (const s of seriesWithCounts){
        wrap.appendChild(
          el("div", { class:"card", style:"box-shadow:none" },
            el("div", { class:"meta" },
              el("div", { style:"display:flex; justify-content:space-between; gap:10px; align-items:baseline" },
                el("div", { style:"font-weight:650" }, s.name),
                el("div", { class:"sub" }, `${s.publishedCount} piece${s.publishedCount===1?"":"s"}`)
              ),
              s.description ? el("div", { class:"sub", style:"margin-top:8px; font-size:15px; line-height:1.65" }, s.description) : null,
              el("div", { style:"margin-top:12px" },
                el("a", { class:"btn", href:`series.html?s=${encodeURIComponent(s.slug)}` }, "Open series →")
              )
            )
          )
        );
      }

      detail.appendChild(wrap);
      renderSeriesList(null);
    }

    function openSeries(slug){
      const s = bySlug.get(slug) || byName.get(slug); // allow name fallback
      if (!s) return renderOverview();

      const pieces = sortPieces(published.filter(a => a.series === s.name));

      detail.innerHTML = "";
      detail.appendChild(
        el("div", { style:"display:flex; gap:10px; align-items:baseline; justify-content:space-between; flex-wrap:wrap" },
          el("p", { class:"title", style:"margin:0" }, s.name),
          el("span", { class:"sub" }, `${pieces.length} piece${pieces.length===1?"":"s"}`)
        )
      );

      detail.appendChild(
        el("p", { class:"sub", style:"margin-top:10px; font-size:15px; line-height:1.65" },
          s.description || "—"
        )
      );

      detail.appendChild(el("hr", { class:"sep" }));

      const grid = el("div", { class:"grid", style:"margin-top:8px" });
      detail.appendChild(grid);

      if (!pieces.length){
        grid.appendChild(el("div", { class:"sub" }, "No published pieces in this series."));
        renderSeriesList(s.slug);
        return;
      }

      pieces.forEach((a, idx) => {
        grid.appendChild(
          el("a", {
            class:"card",
            href:"#",
            style:"grid-column: span 4",
            onclick:(e)=>{ e.preventDefault(); openLightbox(pieces, idx); }
          },
            el("div", { class:"thumb" },
              el("img", { src:a.thumb || a.image, alt:a.alt || a.title || "Artwork", loading:"lazy" })
            ),
            el("div", { class:"meta" },
              el("p", { class:"title" }, a.title || "Untitled"),
              el("p", { class:"sub" }, [a.year || null, a.featured ? "Featured" : null].filter(Boolean).join(" • ") || " ")
            )
          )
        );
      });

      // responsive spans
      const mq1 = window.matchMedia("(max-width: 920px)");
      const mq2 = window.matchMedia("(max-width: 620px)");
      const apply = () => {
        const span = mq2.matches ? 12 : (mq1.matches ? 6 : 4);
        grid.querySelectorAll(".card").forEach(c => c.style.gridColumn = `span ${span}`);
      };
      apply();
      mq1.onchange = apply;
      mq2.onchange = apply;

      renderSeriesList(s.slug);
    }

    // initial route
    const initial = qs("s");
    if (initial){
      const s = bySlug.get(initial) || byName.get(initial);
      if (s) openSeries(s.slug);
      else renderOverview();
    } else {
      renderOverview();
    }
  </script>
</body>
</html>
